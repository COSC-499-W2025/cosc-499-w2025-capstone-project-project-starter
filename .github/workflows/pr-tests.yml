name: PR tests

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out PR code
        uses: actions/checkout@v4

      - name: Also check out main (for pre-test init step)
        uses: actions/checkout@v4
        with:
          ref: main
          path: mainbranch

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Show Python version
        run: python --version

           - name: Create .env files (PR and main)
        run: |
          cp .env.example .env
          cp .env.example mainbranch/.env

      # Verify Docker is installed and running
      - name: Verify Docker setup
        run: |
          echo "Checking Docker installation..."
          docker --version
          docker compose version || docker-compose --version
          echo "Checking Docker daemon status..."
          docker info > /dev/null 2>&1 && echo "Docker is running" || (echo "Docker is not running" && exit 1)

      - name: Start database (Docker)
        run: docker compose up -d


      # Simple wait for DB to be ready (keep it minimal per your command set)
      - name: Wait for DB
        run: sleep 15

      - name: Install dependencies (from PR branch)
        run: pip install -r requirements.txt

      - name: Run project (sanity step on PR branch)
        run: python src/main.py --yes --yes --10


      - name: Run tests
        env:
          PYTHONPATH: .
        run: |
          pytest -v
