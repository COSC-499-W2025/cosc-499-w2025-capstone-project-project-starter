name: Python regression tests

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: artifactminer_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d artifactminer_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    strategy:
      matrix:
        python-version: ["3.11"]

    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/artifactminer_test
      ARTIFACT_MINER_BLOBSTORE: /tmp/artifactminer-blobstore-ci

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libpq-dev build-essential
          python -m pip install --upgrade pip wheel

      - name: Install Python dependencies
        run: |
          if [ -f requirements/dev.txt ]; then
            python -m pip install -r requirements/dev.txt
          else
            python -m pip install -r requirements/api.txt
            python -m pip install pytest
          fi

      - name: Initialize blobstore path
        run: |
          mkdir -p "$ARTIFACT_MINER_BLOBSTORE"

      - name: Run migrations
        run: |
          python -m pip show alembic
          alembic upgrade head

      - name: Run tests
        run: |
          export PYTHONPATH="$(pwd)"
          pytest -q
