name: Python regression tests

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev
          # Remove the reportlab installation here, as it's a Python package installed via pip
          sudo apt-get install -y build-essential libjpeg8-dev zlib1g-dev

      - name: Set up virtual environment
        run: |
          python -m venv venv
          . venv/bin/activate  # Activating the virtual environment

      - name: Install Python dependencies
        run: |
          . venv/bin/activate  # Activate virtualenv
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Install reportlab with pip, not apt
          pip install reportlab

      - name: Set PYTHONPATH to include src directory
        run: |
          echo "PYTHONPATH=$(pwd)/src" >> $GITHUB_ENV

      - name: Run regression tests
        run: |
          . venv/bin/activate  # Ensure virtualenv is activated
          pytest -v
