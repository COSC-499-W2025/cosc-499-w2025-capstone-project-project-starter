# docker-compose.yml
version: "3.9"

services:
  db:
    image: postgres:16
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql  # Optional for initial data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10  # Increased retries

  app:
    build: .
    container_name: artifact-miner
    environment:
      DB_HOST: db  # Set environment variable for connection
      DB_PORT: 5432
      DB_NAME: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
    command: >
      /bin/sh -c "
      echo 'Waiting for database...' &&
      python src/db/wait_for_db.py &&
      echo 'Creating tables...' &&
      python src/db/create_tables.py &&
      echo 'Starting application...' &&
      python src/main.py"
    volumes:
      - .:/app
    ports:
      - "5001:5000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: