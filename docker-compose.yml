version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16
    container_name: artifactminer-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: artifactminer
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d artifactminer"]
      interval: 5s
      timeout: 5s
      retries: 20

  # Database Migrations
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: artifactminer-migrate
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/artifactminer
    depends_on:
      db:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  # Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: artifactminer-api
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/artifactminer
      ARTIFACT_MINER_BLOBSTORE: /blobstore
    volumes:
      - blobstore:/blobstore
    ports:
      - "5001:5000"
    depends_on:
      migrate:
        condition: service_completed_successfully

  # Ollama LLM Service
  ollama:
    profiles: ["external", "analysis"]
    image: ollama/ollama:latest
    container_name: artifactminer-ollama
    volumes:
      - ollama:/root/.ollama
    ports:
      - "11434:11434"

  # Analysis Worker
  worker:
    profiles: ["analysis"]
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: artifactminer-worker
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/artifactminer
      ARTIFACT_MINER_BLOBSTORE: /blobstore
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: mistral
    volumes:
      - blobstore:/blobstore
    depends_on:
      migrate:
        condition: service_completed_successfully
      ollama:
        condition: service_started

  # React Frontend - ADD THIS NEW SERVICE
  frontend:
    build: ./frontend
    container_name: artifactminer-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app           # Hot reload for development
      - /app/node_modules         # Keep node_modules in container
    environment:
      REACT_APP_API_URL: http://localhost:5001  # Access backend on host
      # For Docker-to-Docker communication, use:
      # REACT_APP_API_URL: http://api:5000
    depends_on:
      - api
    stdin_open: true  # Enable interactive terminal
    tty: true         # Enable interactive terminal
    # Use this command for development:
    command: npm start
    # For production build, use:
    # command: serve -s build -l 3000

volumes:
  pgdata:
  blobstore:
  ollama: