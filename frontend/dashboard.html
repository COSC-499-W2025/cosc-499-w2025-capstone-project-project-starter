        function renderTimeline(container, data) {
            const { timeline, skill_summary } = data;

            let html = '<div class="pd-timeline">';
            timeline.forEach((entry, idx) => {
                const dateStr = new Date(entry.date).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
                const isLast = idx === timeline.length - 1;
                html += `<div class="pd-tl-entry${isLast ? ' pd-tl-last' : ''}">
                    <div class="pd-tl-dot"></div>
                    <div class="pd-tl-content">
                        <div class="pd-tl-date">${dateStr}</div>
                        <div class="pd-tl-project">${escapeHtml(entry.project)}</div>
                        <div class="pd-tl-skills-row">`;
                if (entry.new_skills.length > 0) {
                    html += '<div class="pd-tl-new-label">New skills:</div>';
                    entry.new_skills.forEach(s => {
                        html += `<span class="badge badge-success">${escapeHtml(s)}</span>`;
                    });
                }
                if (entry.growing_skills.length > 0) {
                    entry.growing_skills.forEach(gs => {
                        const lvl = gs.depth >= 4 ? 'expert' : gs.depth >= 3 ? 'advanced' : 'intermediate';
                        html += `<span class="badge pd-depth-${lvl}" title="Used in ${gs.depth} projects">${escapeHtml(gs.skill)} (${gs.depth}x)</span>`;
                    });
                }
                html += `</div>
                        <div class="pd-tl-total">${entry.total_skills_at_point} total skills</div>
                    </div>
                </div>`;
            });
            html += '</div>';

            if (skill_summary && skill_summary.length > 0) {
                html += '<div class="pd-skill-summary"><h4>Skill Proficiency</h4><div class="pd-proficiency-grid">';
                skill_summary.slice(0, 20).forEach(s => {
                    const pctWidth = Math.min(100, (s.project_count / Math.max(1, skill_summary[0].project_count)) * 100);
                    const levelClass = s.proficiency.toLowerCase();
                    html += `<div class="pd-prof-item">
                        <div class="pd-prof-label">${escapeHtml(s.skill)}</div>
                        <div class="pd-prof-bar-track"><div class="pd-prof-bar pd-prof-${levelClass}" style="width:${pctWidth}%"></div></div>
                        <div class="pd-prof-level">${s.proficiency}</div>
                    </div>`;
                });
                html += '</div></div>';
            }

            container.innerHTML = html;
        }

        async function loadPdHeatmap() {
            const container = document.getElementById('pdHeatmap');
            if (!container) return;
            container.innerHTML = '<div class="pd-loading"><div class="spinner"></div><p>Loading heatmap...</p></div>';
            try {
                const res = await apiCall(`/api/portfolio/${currentUser.user_name}/heatmap`);
                if (!res.ok) {
                    container.innerHTML = '<p class="text-muted">Could not load heatmap. Upload projects first.</p>';
                    return;
                }
                const data = res.data.data;
                if (!data || !data.activity_data || Object.keys(data.activity_data).length === 0) {
                    container.innerHTML = '<p class="text-muted">No activity data yet. Upload projects to see your heatmap.</p>';
                    return;
                }
                renderHeatmap(container, data);
                setTextSafe('pdActiveDays', data.total_days ?? 0);
            } catch (e) {
                container.innerHTML = '<p class="text-muted">Error loading heatmap.</p>';
                console.error('Heatmap error:', e);
            }
        }

        function renderHeatmap(container, data) {
            const { activity_data, max_activity } = data;
            const dates = Object.keys(activity_data).sort();
            if (dates.length === 0) { container.innerHTML = '<p class="text-muted">No activity data.</p>'; return; }

            const firstDate = new Date(dates[0]);
            const lastDate = new Date(dates[dates.length - 1]);
            const today = new Date();
            const endDate = lastDate > today ? lastDate : today;

            const startDate = new Date(endDate);
            startDate.setFullYear(startDate.getFullYear() - 1);
            if (firstDate < startDate) startDate.setTime(firstDate.getTime());

            const dayMs = 86400000;
            const start = new Date(startDate);
            start.setDate(start.getDate() - start.getDay());

            let html = '<div class="pd-heatmap-grid">';
            const months = [];
            let currentMonth = -1;
            let weekCount = 0;

            const cursor = new Date(start);
            while (cursor <= endDate) {
                const weekStart = new Date(cursor);
                html += '<div class="pd-hm-week">';
                for (let d = 0; d < 7; d++) {
                    const dayDate = new Date(cursor);
                    const key = dayDate.toISOString().slice(0, 10);
                    const act = activity_data[key];
                    let level = 0;
                    let tooltip = key;
                    if (act) {
                        const score = act.score || 0;
                        if (max_activity > 0) {
                            const ratio = score / max_activity;
                            level = ratio > 0.75 ? 4 : ratio > 0.5 ? 3 : ratio > 0.25 ? 2 : 1;
                        } else {
                            level = 1;
                        }
                        tooltip = `${key}: ${act.count} project(s), ${act.files} files, ${act.lines} lines`;
                    }
                    html += `<div class="pd-hm-cell pd-hm-l${level}" title="${escapeHtml(tooltip)}"></div>`;
                    cursor.setDate(cursor.getDate() + 1);
                }
                html += '</div>';

                if (weekStart.getMonth() !== currentMonth) {
                    currentMonth = weekStart.getMonth();
                    months.push({ month: weekStart.toLocaleDateString('en-US', { month: 'short' }), week: weekCount });
                }
                weekCount++;
            }
            html += '</div>';

            html += '<div class="pd-hm-months">';
            months.forEach(m => {
                html += `<span style="grid-column:${m.week + 1}">${m.month}</span>`;
            });
            html += '</div>';

            html += `<div class="pd-hm-legend">
                <span class="text-muted">Less</span>
                <div class="pd-hm-cell pd-hm-l0"></div>
                <div class="pd-hm-cell pd-hm-l1"></div>
                <div class="pd-hm-cell pd-hm-l2"></div>
                <div class="pd-hm-cell pd-hm-l3"></div>
                <div class="pd-hm-cell pd-hm-l4"></div>
                <span class="text-muted">More</span>
            </div>`;

            container.innerHTML = html;
        }

        async function loadPdTopProjects() {
            const container = document.getElementById('pdTopProjects');
            if (!container) return;
            container.innerHTML = '<div class="pd-loading"><div class="spinner"></div><p>Loading top projects...</p></div>';
            try {
                const res = await apiCall(`/api/portfolio/${currentUser.user_name}/top-projects`);
                if (!res.ok) {
                    container.innerHTML = '<p class="text-muted">Could not load top projects. Upload projects first.</p>';
                    return;
                }
                const projects = res.data.projects;
                if (!projects || projects.length === 0) {
                    container.innerHTML = '<p class="text-muted">No projects found. Upload ZIP files to see your top projects showcase.</p>';
                    return;
                }
                renderTopProjects(container, projects);
            } catch (e) {
                container.innerHTML = '<p class="text-muted">Error loading top projects.</p>';
                console.error('Top projects error:', e);
            }
        }

        function renderTopProjects(container, projects) {
            let html = '<div class="pd-showcase-grid">';
            projects.forEach(p => {
                const medalColors = { 1: '#f59e0b', 2: '#94a3b8', 3: '#cd7c32' };
                const medalColor = medalColors[p.rank] || '#6b7280';
                const qualityPct = Math.min(100, p.quality_score || 0);
                const badges = [];
                if (p.has_tests) badges.push('<span class="badge badge-success">Tests</span>');
                if (p.has_docs) badges.push('<span class="badge badge-info">Docs</span>');
                if (p.oop_principles > 0) badges.push('<span class="badge badge-purple">OOP</span>');

                html += `<div class="pd-showcase-card">
                    <div class="pd-showcase-rank" style="background:${medalColor}">#${p.rank}</div>
                    <div class="pd-showcase-header">
                        <h4>${escapeHtml(p.name)}</h4>
                        <span class="pd-showcase-role">${escapeHtml(p.role)}</span>
                    </div>
                    <p class="pd-showcase-desc">${escapeHtml(p.description || '').substring(0, 200)}${(p.description||'').length > 200 ? '...' : ''}</p>
                    <div class="pd-showcase-meta">
                        <div><strong>${(p.lines_of_code||0).toLocaleString()}</strong> <span>lines</span></div>
                        <div><strong>${p.file_count||0}</strong> <span>files</span></div>
                        <div><strong>${p.duration_days||0}</strong> <span>days</span></div>
                        <div><strong>${p.size_mb||0}</strong> <span>MB</span></div>
                    </div>
                    <div class="pd-showcase-quality">
                        <div class="pd-showcase-quality-label">Quality Score</div>
                        <div class="pd-quality-bar-track"><div class="pd-quality-bar" style="width:${qualityPct}%"></div></div>
                        <span>${qualityPct}%</span>
                    </div>
                    <div class="pd-showcase-tech">
                        <span class="badge">${escapeHtml(p.primary_language || 'Unknown')}</span>
                        ${(p.frameworks||[]).map(f => '<span class="badge badge-purple">' + escapeHtml(f) + '</span>').join('')}
                        ${badges.join('')}
                    </div>
                    ${p.languages && p.languages.length > 0 ? `<div class="pd-lang-breakdown">
                        ${p.languages.map(l => `<div class="pd-lang-item">
                            <span>${escapeHtml(l.language)}</span>
                            <div class="pd-lang-bar-track"><div class="pd-lang-bar" style="width:${l.percentage||0}%"></div></div>
                            <span class="text-muted">${l.percentage||0}%</span>
                        </div>`).join('')}
                    </div>` : ''}
                </div>`;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        async function loadPdSkills() {
            const container = document.getElementById('pdSkills');
            if (!container) return;
            container.innerHTML = '<div class="pd-loading"><div class="spinner"></div><p>Loading skills...</p></div>';
            try {
                const res = await apiCall(`/api/portfolio/${currentUser.user_name}/timeline`);
                if (!res.ok) { container.innerHTML = '<p class="text-muted">Could not load skills.</p>'; return; }
                const data = res.data.data;
                if (!data || !data.skill_summary || data.skill_summary.length === 0) {
                    container.innerHTML = '<p class="text-muted">No skills data yet. Upload projects to see skills.</p>';
                    return;
                }
                renderSkillsFromTimeline(container, data.skill_summary);
            } catch (e) {
                container.innerHTML = '<p class="text-muted">Error loading skills.</p>';
            }
        }

        function renderSkillsFromTimeline(container, skillSummary) {
            const categories = {
                'Programming Languages': [],
                'Web Frameworks': [],
                'Tools & DevOps': [],
                'Practices': [],
                'Other': []
            };
            const langKeywords = ['python', 'java', 'javascript', 'typescript', 'c++', 'c#', 'go', 'rust', 'ruby', 'php', 'swift', 'kotlin', 'html', 'css', 'sql', 'shell', 'r', 'dart', 'scala', 'lua', 'perl', 'c', 'react', 'vue', 'svelte', 'markdown', 'json', 'xml', 'yaml', 'toml', 'text', 'ini', 'config', 'batch', 'powershell', 'matlab'];
            const fwKeywords = ['react', 'vue', 'angular', 'django', 'flask', 'express', 'spring', 'node.js', 'fastapi', 'postgresql', 'mongodb'];
            const toolKeywords = ['docker', 'git', 'ci/cd', 'configuration'];
            const practiceKeywords = ['testing', 'documentation'];

            skillSummary.forEach(s => {
                const lower = s.skill.toLowerCase();
                if (fwKeywords.some(k => lower.includes(k))) {
                    categories['Web Frameworks'].push(s);
                } else if (toolKeywords.some(k => lower.includes(k))) {
                    categories['Tools & DevOps'].push(s);
                } else if (practiceKeywords.some(k => lower.includes(k))) {
                    categories['Practices'].push(s);
                } else if (langKeywords.some(k => lower.includes(k) || k.includes(lower))) {
                    categories['Programming Languages'].push(s);
                } else {
                    categories['Other'].push(s);
                }
            });

            let html = '<div class="pd-cat-grid">';
            for (const [cat, skills] of Object.entries(categories)) {
                if (skills.length === 0) continue;
                html += `<div class="pd-cat-card">
                    <h4>${escapeHtml(cat)}</h4>
                    <div class="pd-cat-skills">
                        ${skills.map(s => {
                            const lvl = s.proficiency.toLowerCase();
                            const badgeClass = lvl === 'expert' ? 'badge-purple' : lvl === 'advanced' ? 'badge-info' : lvl === 'intermediate' ? 'badge-success' : '';
                            return `<span class="badge ${badgeClass}" title="${s.proficiency} — used in ${s.project_count} project(s)">${escapeHtml(s.skill)}</span>`;
                        }).join('')}
                    </div>
                </div>`;
            }
            html += '</div>';
            container.innerHTML = html;
        }

        function renderSkillsGrid(container, skills) {
            const categorized = skills.categorized || {};
            if (Object.keys(categorized).length === 0) {
                container.innerHTML = '<p class="text-muted">No categorized skills found.</p>';
                return;
            }
            let html = '<div class="pd-cat-grid">';
            for (const [cat, catSkills] of Object.entries(categorized)) {
                html += `<div class="pd-cat-card">
                    <h4>${escapeHtml(cat)}</h4>
                    <div class="pd-cat-skills">
                        ${catSkills.map(s => `<span class="badge">${escapeHtml(s)}</span>`).join('')}
                    </div>
                </div>`;
            }
            html += '</div>';
            container.innerHTML = html;
        }

        // Portfolio Customization Functions
        let customizedProjectIds = [];
        let currentCustomizingProjectId = null;
        
        // Cache DOM elements for modal
        let modalElements = null;
        
        function getModalElements() {
            if (!modalElements) {
                modalElements = {
                    modal: document.getElementById('customizeModal'),
                    projectName: document.getElementById('modalProjectName'),
                    title: document.getElementById('customTitle'),
                    description: document.getElementById('customDescription'),
                    role: document.getElementById('customRole')
                };
            }
            return modalElements;
        }

        async function loadCustomizedProjects() {
            const container = document.getElementById('customizeProjectsList');
            if (!container) return;
            
            container.innerHTML = '<p style="text-align: center; padding: 20px;">Loading projects...</p>';
            
            try {
                // Load list of customized project IDs
                const customData = await apiCall(`/api/portfolio/${currentUser.user_name}/custom-data`);
                customizedProjectIds = customData.project_ids || [];
                
                if (!projects.length) {
                    container.innerHTML = '<p>No projects found. Upload projects first.</p>';
                    return;
                }
                
                // Render project list with customization status
                container.innerHTML = projects.map(p => {
                    const isCustomized = customizedProjectIds.includes(p.id);
                    const badge = isCustomized ? '<span class="badge-customized">CUSTOMIZED</span>' : '';
                    return `<div class="project-item">
                        <div class="project-row">
                            <div class="project-info">
                                <strong>${p.filename}</strong> (ID: ${p.id})${badge}
                                <br>
                                <small>Files: ${p.file_count || 0} | Created: ${new Date(p.created_at).toLocaleDateString()}</small>
                            </div>
                            <button class="btn-customize" onclick="openCustomizeModal(${p.id}, '${p.filename.replace(/'/g, "\\'")}')">
                                ${isCustomized ? 'Edit' : 'Customize'}
                            </button>
                        </div>
                    </div>`;
                }).join('');
                
            } catch (e) {
                container.innerHTML = '<p class="message error">Error loading projects</p>';
                showMessage('Failed to load projects', 'error');
            }
        }

        async function openCustomizeModal(projectId, projectName) {
            currentCustomizingProjectId = projectId;
            const elements = getModalElements();
            
            elements.projectName.textContent = projectName;
            
            // Clear form
            elements.title.value = '';
            elements.description.value = '';
            elements.role.value = '';
            
            // Load existing customization if any
            try {
                const data = await apiCall(`/api/portfolio/${currentUser.user_name}/custom-data/${projectId}`);
                if (data.success) {
                    elements.title.value = data.custom_title || '';
                    elements.description.value = data.custom_description || '';
                    elements.role.value = data.custom_role || '';
                }
            } catch (e) {
                // No existing customization, keep form empty
            }
            
            elements.modal.classList.add('show');
        }

        function closeCustomizeModal() {
            getModalElements().modal.classList.remove('show');
            currentCustomizingProjectId = null;
        }

        async function saveCustomization(event) {
            event.preventDefault();
            
            if (!currentCustomizingProjectId) {
                showMessage('No project selected', 'error');
                return;
            }
            
            const elements = getModalElements();
            const customTitle = elements.title.value.trim();
            const customDescription = elements.description.value.trim();
            const customRole = elements.role.value.trim();
            
            try {
                const data = await apiCall(`/api/portfolio/${currentUser.user_name}/custom-data`, {
                    method: 'POST',
                    body: JSON.stringify({
                        project_id: currentCustomizingProjectId,
                        custom_title: customTitle,
                        custom_description: customDescription,
                        custom_role: customRole
                    })
                });
                
                if (data.success) {
                    showMessage('Portfolio customization saved successfully', 'success');
                    closeCustomizeModal();
                    loadCustomizedProjects();
                } else {
                    showMessage('Failed to save customization', 'error');
                }
            } catch (e) {
                showMessage('Error saving customization', 'error');
            }
        }

        async function clearCustomization() {
            if (!currentCustomizingProjectId) {
                showMessage('No project selected', 'error');
                return;
            }
            
            if (!confirm('Are you sure you want to clear all customizations for this project?')) {
                return;
            }
            
            try {
                const data = await apiCall(`/api/portfolio/${currentUser.user_name}/custom-data/${currentCustomizingProjectId}`, {
                    method: 'DELETE'
                });
                
                if (data.success) {
                    showMessage('Portfolio customization cleared', 'success');
                    closeCustomizeModal();
                    loadCustomizedProjects();
                } else {
                    showMessage('Failed to clear customization', 'error');
                }
            } catch (e) {
                showMessage('Error clearing customization', 'error');
            }
        }

        // Close modal when clicking outside
        window.addEventListener('click', function(event) {
            if (event.target === getModalElements().modal) {
                closeCustomizeModal();
            }
        });

        // Theme Toggle
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeUI(newTheme);
        }

        function updateThemeUI(theme) {
            const themeIcon = document.getElementById('themeIcon');
            const themeLabel = document.getElementById('themeLabel');
            
            if (theme === 'dark') {
                // Show sun icon for switching to light
                themeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />';
                themeLabel.textContent = 'Light';
            } else {
                // Show moon icon for switching to dark
                themeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />';
                themeLabel.textContent = 'Dark';
            }
        }

        // Initialize theme on page load
        (function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeUI(savedTheme);
        })();

    </script>
