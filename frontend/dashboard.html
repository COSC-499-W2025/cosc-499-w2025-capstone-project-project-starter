<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artifact - Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <header class="header">
        <div class="header-left">
            <h1>Artifact Dashboard <span id="username"></span></h1>
        </div>
        <div class="header-actions">
            <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle" aria-label="Toggle theme">
                <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                </svg>
                <span id="themeLabel">Dark</span>
            </button>
            <button class="btn btn-secondary" onclick="logout()">Sign Out</button>
        </div>
    </header>
    
    <div id="messageBox" class="message" style="display: none;"></div>
    
    <div id="customizeModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Customize Portfolio Project</h3>
                <button class="modal-close" onclick="closeCustomizeModal()">&times;</button>
            </div>
            <div class="modal-project-info">
                <strong id="modalProjectName"></strong>
            </div>
            <form id="customizeForm" onsubmit="saveCustomization(event)">
                <div class="form-group">
                    <label for="customTitle">Custom Title</label>
                    <input type="text" id="customTitle" placeholder="e.g., Advanced Web Application" />
                    <div class="form-hint">Override the project's default title</div>
                </div>
                <div class="form-group">
                    <label for="customDescription">Custom Description</label>
                    <textarea id="customDescription" placeholder="Describe what makes this project special..."></textarea>
                    <div class="form-hint">Provide a custom description for your portfolio</div>
                </div>
                <div class="form-group">
                    <label for="customRole">Your Role</label>
                    <input type="text" id="customRole" placeholder="e.g., Lead Developer, Full Stack Engineer" />
                    <div class="form-hint">Specify your role in this project</div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeCustomizeModal()">Cancel</button>
                    <button type="button" class="btn" style="background: #dc2626;" onclick="clearCustomization()">Clear</button>
                    <button type="submit" class="btn">Save</button>
                </div>
            </form>
        </div>
    </div>
    
    <div class="nav-wrapper" id="navWrapper">
        <nav class="nav-bar" aria-label="Main navigation">
            <div class="nav-tabs">
                <button type="button" class="menu-btn nav-tab" data-view="overview" onclick="showView('overview')">Overview</button>
                <div class="menu-group nav-group">
                    <button type="button" class="menu-btn nav-tab caret" id="projectMenuToggle" onclick="toggleSubmenu('projectSubmenu', 'projectMenuToggle')">Project Actions</button>
                    <div class="submenu-grid" id="projectSubmenu">
                        <button type="button" class="menu-btn submenu-btn" data-view="upload" onclick="showView('upload')">Upload ZIP</button>
                        <button type="button" class="menu-btn submenu-btn" data-view="list" onclick="showView('list')">List Projects</button>
                        <button type="button" class="menu-btn submenu-btn" data-view="analyze" onclick="showView('analyze')">Analyze Project</button>
                        <button type="button" class="menu-btn submenu-btn" data-view="thumbnail" onclick="showView('thumbnail')">Add Thumbnail</button>
                        <button type="button" class="menu-btn submenu-btn" data-view="merge" onclick="showView('merge')">Merge ZIP</button>
                    </div>
                </div>
                <div class="menu-group nav-group">
                    <button type="button" class="menu-btn nav-tab caret" id="rankingMenuToggle" onclick="toggleSubmenu('rankingSubmenu', 'rankingMenuToggle')">Ranking Tools</button>
                    <div class="submenu-grid" id="rankingSubmenu">
                        <button type="button" class="menu-btn submenu-btn" data-view="rank" onclick="showView('rank')">Rank Projects</button>
                        <button type="button" class="menu-btn submenu-btn" data-view="rank-top3" onclick="showView('rank-top3')">Rank Top 3</button>
                        <button type="button" class="menu-btn submenu-btn" data-view="rankings" onclick="showView('rankings')">View Rankings</button>
                        <button type="button" class="menu-btn submenu-btn" data-view="rank-gemini" onclick="showView('rank-gemini')">AI Rank (Gemini)</button>
                    </div>
                </div>
                <div class="menu-group nav-group">
                    <button type="button" class="menu-btn nav-tab caret" id="settingsMenuToggle" onclick="toggleSubmenu('settingsSubmenu', 'settingsMenuToggle')">Settings</button>
                    <div class="submenu-grid" id="settingsSubmenu">
                        <button type="button" class="menu-btn submenu-btn" data-view="external" onclick="showView('external')">External Services</button>
                        <button type="button" class="menu-btn submenu-btn" data-view="cleanup" onclick="showView('cleanup')">Cleanup Insights</button>
                        <button type="button" class="menu-btn submenu-btn" data-view="preferences" onclick="showView('preferences')">Preferences</button>
                        <button type="button" class="menu-btn submenu-btn" data-view="account" onclick="showView('account')">Account</button>
                    </div>
                </div>
                <div class="menu-group nav-group">
                    <button type="button" class="menu-btn nav-tab caret" id="resumeMenuToggle" onclick="toggleSubmenu('resumeSubmenu', 'resumeMenuToggle')">Resume Tools</button>
                    <div class="submenu-grid" id="resumeSubmenu">
                        <button type="button" class="menu-btn submenu-btn" data-view="resume-gen" onclick="showView('resume-gen')">Generate Resume</button>
                        <button type="button" class="menu-btn submenu-btn" data-view="resume-view" onclick="showView('resume-view')">View Resume</button>
                        <button type="button" class="menu-btn submenu-btn" data-view="resume-delete" onclick="showView('resume-delete')">Delete Resume</button>
                    </div>
                </div>
                <button type="button" class="menu-btn nav-tab" data-view="portfolio-dashboard" onclick="showView('portfolio-dashboard')">Portfolio</button>
                <button type="button" class="menu-btn nav-tab" data-view="customize-portfolio" onclick="showView('customize-portfolio')">Customize Portfolio</button>
                <button type="button" class="menu-btn nav-tab" onclick="window.location.href='public-dashboard.html'">Public Dashboard</button>
                <button type="button" class="menu-btn nav-tab" data-view="llm-summary" onclick="showView('llm-summary')">LLM Summary</button>
            </div>
        </nav>
        <div class="nav-dropdown-slot" id="navDropdownSlot" aria-hidden="true"></div>
    </div>
    <div id="viewContainer"></div>

    <div id="error-toast" class="toast hidden">
        <div class="toast-header">
            <strong class="mr-auto">Server Error</strong>
            <button type="button" class="close-toast-btn" onclick="closeErrorToast()">&times;</button>
        </div>
        <div class="toast-body">
            <span id="toast-message">An unexpected error occurred.</span><br>
            <small class="text-muted" style="color: gray;">Request ID: <span id="toast-request-id"></span></small>
        </div>
    </div>

    <script>
        const API_BASE_URL = window.location.origin;
        const API_BASE = API_BASE_URL;
        let currentUser = null;
        let projects = [];
        let lastRankedProjects = [];
        let selectedProjectId = null;

        // Dashboard State Persistence
        const DASHBOARD_STATE_KEY = 'dashboard_state_v1';

        function loadDashboardState() {
            try {
                const raw = localStorage.getItem(DASHBOARD_STATE_KEY);
                return raw ? JSON.parse(raw) : null;
            } catch {
                return null;
            }
        }

        function saveDashboardState(patch) {
            const prev = loadDashboardState() || {};
            const next = { ...prev, ...patch, updated_at: new Date().toISOString() };
            localStorage.setItem(DASHBOARD_STATE_KEY, JSON.stringify(next));
            return next;
        }

        function clearDashboardState() {
            localStorage.removeItem(DASHBOARD_STATE_KEY);
        }

        // Check auth on load — only redirect when user is missing or invalid, not on API/DOM errors
        document.addEventListener('DOMContentLoaded', async () => {
            const storedUser = localStorage.getItem('user');
            if (!storedUser) {
                window.location.href = 'index.html';
                return;
            }
            let userParsed = null;
            try {
                userParsed = JSON.parse(storedUser);
            } catch (e) {
                localStorage.removeItem('user');
                window.location.href = 'index.html';
                return;
            }
            if (!userParsed || !userParsed.user_name) {
                localStorage.removeItem('user');
                window.location.href = 'index.html';
                return;
            }
            currentUser = userParsed;
            const usernameEl = document.getElementById('username');
            if (usernameEl) usernameEl.textContent = '– ' + currentUser.user_name;

            try {
                await loadProjects();
            } catch (e) {
                console.error('Load projects failed:', e);
                showMessage('Could not load projects. You can try again.', 'error');
            }

            try {
                const state = loadDashboardState();
                const view = state?.activeView || 'overview';
                selectedProjectId = state?.selectedProjectId || null;
                showView(view, { preserveSelection: true });
            } catch (e) {
                console.error('Show view failed:', e);
                showView('overview');
            }
        });
        
        document.addEventListener('click', (e) => {
            const item = e.target.closest('.project-item');
            if (!item) return;

            const projectId = item.dataset.projectId;
            const containerId = item.dataset.containerId;
            const onSelect = item.dataset.onSelect;

            selectProject(e, Number(projectId), containerId, onSelect);
        });

        function showMessage(text, type) {
            const msg = document.getElementById('messageBox');
            msg.textContent = text;
            msg.className = `message ${type}`;
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 5000);
        }
        // --- Global Error Toast Functions ---
        function showErrorToast(message, requestId) {
            const toast = document.getElementById('error-toast');
            document.getElementById('toast-message').innerText = message;
            
            // Display the specific X-Request-ID or a fallback
            document.getElementById('toast-request-id').innerText = requestId || "N/A";
            
            toast.classList.add('show');
            toast.classList.remove('hidden');

            setTimeout(() => {
                closeErrorToast();
            }, 8000);
        }

        function closeErrorToast() {
            const toast = document.getElementById('error-toast');
            toast.classList.remove('show');
        }

        async function apiCall(endpoint, options = {}) {
            try {
                const response = await fetch(`${API_BASE_URL}${endpoint}`, options);
                const data = await response.json().catch(() => ({}));

                if (!response.ok) {

                    const msg = data.detail || data.message || `Request failed (${response.status})`;
                    const reqId = data.request_id || "unknown-id"; 
                    showErrorToast(msg, reqId);
                    
                    return { ok: false, error: msg, status: response.status, data };
                }
                return { ok: true, data, status: response.status };
            } catch (e) {
                const errorMsg = e.message || "Network error";
                showErrorToast(errorMsg, "offline");
                return { ok: false, error: errorMsg, status: 0, data: null };
            }
        }

        function renderResult(container, html) {
            container.innerHTML = html;
        }

        function renderError(container, message) {
            const safe = escapeHtml(message);
            if (container) {
                // Do not overwrite complex HTML and prepend a message block instead.
                container.insertAdjacentHTML('afterbegin', `<div class="message error">${safe}</div>`);
            }
            showMessage(safe, "error");
        }

        function renderSuccess(container, message) {
            const safe = escapeHtml(message);
            if (container) {
                // Do not overwrite complex HTML and prepend a message block instead.
                container.insertAdjacentHTML('afterbegin', `<div class="message success">${safe}</div>`);
            }
            showMessage(safe, "success");
        }

        function escapeHtml(str) {
            return String(str)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        // Multipurpose API request function that can handle JSON and FormData bodies, and provides consistent error handling
        async function apiRequest(endpoint, { method = 'GET', body = null, headers = {} } = {}) {
            const opts = { method, headers: { ...headers } };

            const isFormData = body instanceof FormData;

            if (body) {
                opts.body = body;
                if (!isFormData) {
                    opts.headers['Content-Type'] = 'application/json';
                }
            }

            const response = await fetch(`${API_BASE_URL}${endpoint}`, opts);

            // try to parse JSON, but fallback to text if not possible
            const contentType = response.headers.get('content-type') || '';
            const payload = contentType.includes('application/json') ? await response.json() : await response.text();

            if (!response.ok) {
                const msg =
                    (payload && typeof payload === 'object' && (payload.detail || payload.message)) ||
                    (typeof payload === 'string' ? payload : 'Request failed');
                showMessage(msg, 'error');
                throw new Error(msg);
            }

            return payload;
        }

        async function loadProjectThumbnail(projectId, imgEl) {
            try {
                const res = await apiCall(`/api/projects/${projectId}/thumbnail?user_name=${currentUser.user_name}`);
                if (!res.ok) { showMessage(res.error, "error"); return; }
                const data = res.data;
                if (data.success && data.has_thumbnail && data.thumbnail_data) {
                    imgEl.src = data.thumbnail_data;
                } else {
                    imgEl.remove();
                }
            } catch (e) {
                imgEl.remove();
            }
        }

        async function loadProjects() {
            try {
                const res = await apiCall(`/api/projects?user_name=${currentUser.user_name}`);
                if (!res.ok) { showMessage(res.error, "error"); return; }
                const data = res.data;
                if (data.success) projects = data.projects || [];
            } catch (e) {
                console.error('Failed to load projects:', e);
            }
        }

        function refreshProjectListsWithThumbnails() {
            const listId = 'projectsList';
            const analyzeId = 'analyzeProjectsList';
            const thumbnailId = 'thumbnailProjectsList';
            if (document.getElementById(listId)) {
                renderProjectsList(listId, 'onProjectSelect', true);
            }
            if (document.getElementById(analyzeId)) {
                renderProjectsList(analyzeId, 'onProjectSelect', true);
            }
            if (document.getElementById(thumbnailId)) {
                renderProjectsList(thumbnailId, 'onProjectSelect', true);
            }
        }

        async function getProjectDetails(id) {
            try {
                return await apiCall(`/api/projects/${id}?user_name=${currentUser.user_name}`);
            } catch (e) {
                return null;
            }
        }

        function updateNavDropdownSlot() {
            const wrapper = document.getElementById('navWrapper');
            const anyOpen = document.querySelector('.submenu-grid.open');
            if (wrapper) {
                if (anyOpen) wrapper.classList.add('dropdown-open');
                else wrapper.classList.remove('dropdown-open');
            }
        }

        function toggleSubmenu(submenuId, toggleId) {
            const submenu = document.getElementById(submenuId);
            const toggle = document.getElementById(toggleId);

            const wasOpen = submenu.classList.contains('open');

            document.querySelectorAll('.submenu-grid.open').forEach(s => s.classList.remove('open'));
            document.querySelectorAll('.menu-btn.caret.open').forEach(t => t.classList.remove('open'));

            if (!wasOpen) {
                submenu.classList.add('open');
                toggle.classList.add('open');
            }
            updateNavDropdownSlot();
        }

        async function submitPrivacyConsent(consentGiven) {
            try {
                const res = await apiCall('/api/privacy-consent', {
                    method: 'POST',
                    body: JSON.stringify({
                        consent_given: consentGiven,
                        user_id: currentUser.user_id || currentUser.user_name
                    })
                });
                if (!res.ok) { showMessage(res.error, "error"); return; }
                const data = res.data;
                if (data.success) {
                    showMessage(`Privacy consent ${consentGiven ? 'granted' : 'denied'}`, 'success');
                }
                return data;
            } catch (e) {
                return null;
            }
        }

        function renderProjectsList(containerId, onSelect, showThumbnails = false) {
            const container = document.getElementById(containerId);
            if (!projects.length) {
                container.innerHTML = '<p>No projects found</p>';
                return;
            }
            container.innerHTML = projects.map(p => 
                `<div class="project-item"
                    onclick="selectProject(event, ${p.id}, '${containerId}', '${onSelect}')"
                    data-project-id="${p.id}"
                    data-container-id="${containerId}"
                    data-on-select="${onSelect}">
                    <div class="project-row">
                        ${showThumbnails && p.has_thumbnail ? `<img class="project-thumbnail" data-project-id="${p.id}" alt="Thumbnail for ${p.filename}" />` : ''}
                        <div class="project-info">
                            <strong>${p.filename}</strong> (ID: ${p.id})<br>
                            <small>Files: ${p.file_count || 0} | Created: ${new Date(p.created_at).toLocaleDateString()}</small>
                        </div>
                    </div>
                </div>`
            ).join('');

            if (showThumbnails) {
                container.querySelectorAll('.project-thumbnail').forEach(img => {
                    const projectId = img.getAttribute('data-project-id');
                    if (projectId) {
                        loadProjectThumbnail(projectId, img);
                    }
                });
            }
        }

        function selectProject(evt, id, containerId, callback) {
            selectedProjectId = id;
            saveDashboardState({ selectedProjectId: id });

            document.querySelectorAll(`#${containerId} .project-item`).forEach(el => el.classList.remove('selected'));

            const item = evt?.target?.closest?.('.project-item');
            if (item) item.classList.add('selected');

            if (window[callback]) window[callback](id);
        }

        function showView(viewName, options = {}) {
            const { preserveSelection = false } = options;
            const container = document.getElementById('viewContainer');

            // Close all dropdowns and collapse the reserved slot
            document.querySelectorAll('.submenu-grid.open').forEach(s => s.classList.remove('open'));
            document.querySelectorAll('.menu-btn.caret.open').forEach(t => t.classList.remove('open'));
            if (typeof updateNavDropdownSlot === 'function') updateNavDropdownSlot();

            // If not preserving selection, clear selected project and update state
            if (!preserveSelection) {
                selectedProjectId = null;
                saveDashboardState({ selectedProjectId: null });
            }
            saveDashboardState({ activeView: viewName });

            const projectCount = (projects && projects.length) || 0;
            const userName = (currentUser && currentUser.user_name) ? escapeHtml(currentUser.user_name) : '';

            const views = {
                'overview': `<div class="view-panel dashboard-overview">
                    <div class="dashboard-hero">
                        <div class="dashboard-hero-text">
                            <h2>Welcome to Your Dashboard</h2>
                            <p>Manage your projects, rank them with AI, build your portfolio, and showcase your work — all in one place.</p>
                        </div>
                        <div class="dashboard-stats">
                            <div class="dashboard-stat">
                                <div class="dashboard-stat-value" id="overviewProjectCount">${projectCount}</div>
                                <div class="dashboard-stat-label">Total Projects</div>
                            </div>
                        </div>
                    </div>
                    <div class="dashboard-quick-actions">
                        <button type="button" class="dashboard-quick-action" onclick="showView('list')">
                            <strong>Projects</strong>
                            <span>Upload, organize, and manage all your development projects in one centralized location.</span>
                        </button>
                        <button type="button" class="dashboard-quick-action" onclick="showView('analyze')">
                            <strong>Analyze</strong>
                            <span>Deep dive into your project's structure, dependencies, complexity, and technical stack.</span>
                        </button>
                        <button type="button" class="dashboard-quick-action" onclick="showView('rank-gemini')">
                            <strong>AI Ranking</strong>
                            <span>Use Gemini AI to intelligently rank your projects by quality, complexity, and technical skills.</span>
                        </button>
                        <button type="button" class="dashboard-quick-action" onclick="showView('resume-gen')">
                            <strong>Resume Tools</strong>
                            <span>Generate, update, and export professional resumes tailored to your project history and skills.</span>
                        </button>
                        <button type="button" class="dashboard-quick-action" onclick="showView('portfolio-dashboard')">
                            <strong>Portfolio</strong>
                            <span>View your portfolio dashboard with skills timeline, activity heatmap, and top project showcase.</span>
                        </button>
                        <button type="button" class="dashboard-quick-action" onclick="showView('preferences')">
                            <strong>Settings</strong>
                            <span>Manage preferences, privacy consent, Git username, and external service permissions.</span>
                        </button>
                    </div>
                </div>`,
                'upload': `<div class="view-panel"><h3>Upload ZIP File</h3><input type="file" id="zipFile" accept=".zip" /><button class="btn" onclick="uploadFile()">Upload</button><div id="uploadResult"></div></div>`,
                'list': `<div class="view-panel"><h3>Stored Projects</h3><button class="btn" onclick="refreshProjects()">Refresh</button><button class="btn btn-secondary" onclick="loadSkills()">View Skills</button><div id="projectsList" class="project-list"></div><div id="skillsResult" class="result"></div></div>`,
                'analyze': `<div class="view-panel analyze-view">
                    <div class="analyze-header">
                        <h3>Analyze Project</h3>
                        <p class="analyze-desc">Run local (pattern-based) or AI-powered analysis on a project. Local analysis is fast and private; AI analysis gives deeper insights and recommendations.</p>
                    </div>
                    <div class="analyze-project-select">
                        <label class="analyze-label">Select a project</label>
                        <div id="analyzeProjectsList" class="project-list"></div>
                    </div>
                    <div class="analyze-actions">
                        <div class="analyze-action-card analyze-action-local">
                            <div class="analyze-action-icon">⚡</div>
                            <h4>Local Analysis</h4>
                            <p>Fast, private pattern-based analysis: languages, frameworks, structure, code quality, OOP, and file stats.</p>
                            <button type="button" class="btn" onclick="analyzeProject()">Run Local Analysis</button>
                        </div>
                        <div class="analyze-action-card analyze-action-gemini">
                            <div class="analyze-action-icon">✦</div>
                            <h4>AI Deep Analysis (Gemini)</h4>
                            <p>Thorough semantic analysis: quality score, architecture, recommendations, security, and best practices. May take 15–30 seconds.</p>
                            <button type="button" class="btn btn-gemini" onclick="analyzeProjectGemini()">Run AI Analysis</button>
                        </div>
                    </div>
                    <div class="analyze-results-wrapper">
                        <div class="analyze-tabs">
                            <button type="button" class="analyze-tab active" data-tab="local" onclick="switchAnalyzeTab('local')">Local</button>
                            <button type="button" class="analyze-tab" data-tab="ai" onclick="switchAnalyzeTab('ai')">AI (Gemini)</button>
                        </div>
                        <div id="analyzeResultLocal" class="analyze-tab-pane active" role="tabpanel"></div>
                        <div id="analyzeResultAi" class="analyze-tab-pane" role="tabpanel"></div>
                    </div>
                </div>`,
                'rank': `<div class="view-panel"><h3>Rank All Projects</h3><p class="text-muted" style="margin-bottom: 12px; font-size: 0.9em;">Rank your projects by score, then save the rankings to the database.</p><div class="rank-actions"><button type="button" class="btn" onclick="rankProjects()">Rank Projects</button><button type="button" class="btn btn-secondary" id="rankSaveBtn" onclick="saveRankingsToDb()" disabled>Save to database</button></div><div id="rankResult" class="result rank-result"></div></div>`,
                'rank-top3': `<div class="view-panel"><h3>Rank and Summarize Top 3</h3><p class="text-muted" style="margin-bottom: 12px; font-size: 0.9em;">Rank all projects, summarize the top 3, then save rankings to the database (like the backend).</p><div class="rank-actions"><button type="button" class="btn" onclick="rankTop3()">Rank & Summarize</button><button type="button" class="btn btn-secondary" id="rankTop3SaveBtn" onclick="saveRankingsToDb()" disabled>Save to database</button></div><div id="rankTop3Result" class="result rank-result"></div></div>`,
                'rankings': `<div class="view-panel"><h3>View and Edit Rankings</h3><p class="text-muted" style="margin-bottom: 12px; font-size: 0.9em;">Load and view rankings stored in the database.</p><button type="button" class="btn" onclick="loadRankings()">Load Rankings</button><div id="rankingsList" class="result rank-result"></div></div>`,
                'rank-gemini': `<div class="view-panel"><h3>AI Rank Projects (Gemini)</h3><p class="text-muted" style="margin-bottom: 12px; font-size: 0.9em;">Uses Gemini AI to comparatively rank your projects by quality, complexity, and skills.</p><div class="rank-actions"><button type="button" class="btn" onclick="rankProjectsGemini()">Rank with Gemini</button><button type="button" class="btn btn-secondary" id="rankGeminiSaveBtn" onclick="saveRankingsToDb()" disabled>Save to database</button></div><div id="rankGeminiResult" class="result rank-result"></div></div>`,

        async function uploadFile() {
            const fileInput = document.getElementById('zipFile');
            const resultDiv = document.getElementById('uploadResult');
            if (!fileInput?.files[0]) {
                showMessage('Please select a file', 'error');
                return;
            }
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            resultDiv.innerHTML = 'Uploading...';
            try {
                const data = await apiRequest(`/api/projects/upload?user_name=${currentUser.user_name}`, {
                    method: 'POST',
                    body: formData
                });
                if (data.success) {
                    renderSuccess(resultDiv, `Project "${data.filename}" uploaded successfully with ID ${data.project_id}.`);
                    loadProjects();
                } else {
                    renderError(resultDiv, data.message || 'Upload failed');
                }
            } catch (e) {
                renderError(resultDiv, e.message);
            }
        }

        function refreshProjects() {
            loadProjects().then(() => {
                renderProjectsList('projectsList', 'onProjectSelect', true);
                showMessage('Projects refreshed', 'success');
            });
        }

            selectedProjectId = id;

        function formatAnalysisResults(analysis) {
            const projInfo = analysis.project_info || {};
            const stats = analysis.file_statistics || {};
            const langs = analysis.languages || {};
            const zipReport = analysis.zip_success_report || null;
            const zipSuccess = zipReport && !zipReport.error && zipReport.success;
            const zipStatus = zipSuccess ? (zipReport.success.status || 'unknown').toUpperCase() : (zipReport?.error ? 'N/A' : '—');

            // Summary card (at a glance)
            let html = '<div class="analysis-summary-card">';
            html += '<h4 class="analysis-summary-title">Overview</h4>';
            html += '<div class="analysis-summary-grid">';
            html += `<div class="analysis-summary-item"><span class="analysis-summary-label">Project</span><span class="analysis-summary-value">${escapeHtml(projInfo.filename || 'Unknown')}</span></div>`;
            html += `<div class="analysis-summary-item"><span class="analysis-summary-label">Strategy</span><span class="analysis-summary-value">${analysis.analysis_strategy || 'local'}</span></div>`;
            html += `<div class="analysis-summary-item"><span class="analysis-summary-label">Primary language</span><span class="analysis-summary-value">${langs.primary_language || '—'}</span></div>`;
            html += `<div class="analysis-summary-item"><span class="analysis-summary-label">Files</span><span class="analysis-summary-value">${stats.total_files ?? '—'}</span></div>`;
            html += `<div class="analysis-summary-item"><span class="analysis-summary-label">Lines of code</span><span class="analysis-summary-value">${stats.total_lines_of_code ?? '—'}</span></div>`;
            html += `<div class="analysis-summary-item"><span class="analysis-summary-label">ZIP status</span><span class="analysis-summary-value">${zipStatus}</span></div>`;
            html += '</div></div>';

            // Languages (detailed)
            if (langs.detected_languages && langs.detected_languages.length > 0) {
                html += '<div class="analysis-section">';
                html += '<h4>Languages</h4>';
                html += '<div class="analysis-item">';
                html += '<span class="analysis-label">Detected:</span>';
                html += '<div class="analysis-badges">';
                langs.detected_languages.forEach(lang => {
                    const count = langs.file_counts?.[lang] || 0;
                    const pct = langs.language_percentages?.[lang] || 0;
                    html += `<span class="badge">${escapeHtml(lang)} (${count} files, ${pct}%)</span>`;
                });
                html += '</div></div></div>';
            }

            // Evidence of Success (ZIP)
            if (zipReport) {
                html += '<div class="analysis-section">';
                html += '<h4>Evidence of Success (ZIP)</h4>';
                if (zipReport.error) {
                    html += `<div class="analysis-item"><span class="analysis-label">Status:</span><span class="analysis-value">${zipReport.error}</span></div>`;
                } else {
                    const success = zipReport.success || {};
                    const status = (success.status || 'unknown').toUpperCase();
                    const score = success.score !== undefined ? success.score : 0;
                    const confidence = success.confidence !== undefined ? success.confidence : 0;
                    const statusColor = status === 'SUCCESS' ? '#22c55e' : status === 'PARTIAL' ? '#d97706' : '#dc2626';
                    html += `<div class="analysis-item"><span class="analysis-label">Status:</span><span class="analysis-value" style="color: ${statusColor}; font-weight: 600;">${status}</span></div>`;
                    html += `<div class="analysis-item"><span class="analysis-label">Score:</span><span class="analysis-value">${score}/100 (confidence ${confidence})</span></div>`;
                    html += `<div class="analysis-item"><span class="analysis-label">Result:</span><span class="analysis-value">${success.is_successful ? 'SUCCESS' : 'NOT SUCCESSFUL'}</span></div>`;

                    const evidence = zipReport.evidence || {};
                    const addEvidenceRow = (label, values, limit = 10) => {
                        if (!values || (Array.isArray(values) && values.length === 0)) return;
                        html += '<div class="analysis-item">';
                        html += `<span class="analysis-label">${escapeHtml(label)}:</span>`;
                        html += '<div class="analysis-badges">';
                        const list = Array.isArray(values) ? values.slice(0, limit) : [values];
                        list.forEach(val => {
                            html += `<span class="badge">${escapeHtml(String(val))}</span>`;
                        });
                        html += '</div></div>';
                    };

                    addEvidenceRow('Entrypoints', evidence.entrypoints);
                    addEvidenceRow('Dependencies', evidence.dependency_manifests);
                    addEvidenceRow('Tests', evidence.test_files);
                    addEvidenceRow('CI Files', evidence.ci_files);
                    addEvidenceRow('README', evidence.readme_file, 1);
                    addEvidenceRow('Docs', evidence.docs_files);
                    addEvidenceRow('Usage Markers', evidence.usage_markers);
                    addEvidenceRow('Incomplete Markers', evidence.incomplete_markers);
                    addEvidenceRow('Build Artifacts', evidence.build_artifacts);
                    addEvidenceRow('License', evidence.license_files);
                }
                html += '</div>';
            }
            
            // File Statistics
            if (stats.total_files !== undefined) {
                html += '<div class="analysis-section">';
                html += '<h4>File Statistics</h4>';
                html += `<div class="analysis-item"><span class="analysis-label">Total Files:</span><span class="analysis-value">${stats.total_files}</span></div>`;
                html += `<div class="analysis-item"><span class="analysis-label">Total Size:</span><span class="analysis-value">${stats.total_size_mb || 0} MB</span></div>`;
                html += `<div class="analysis-item"><span class="analysis-label">Text / Binary:</span><span class="analysis-value">${stats.text_files || 0} text, ${stats.binary_files || 0} binary</span></div>`;
                html += `<div class="analysis-item"><span class="analysis-label">Lines of Code:</span><span class="analysis-value">${stats.total_lines_of_code || 0}</span></div>`;
                html += '</div>';
            }
            
            // Frameworks
            const frameworks = analysis.frameworks || [];
            if (frameworks.length > 0) {
                html += '<div class="analysis-section">';
                html += '<h4>Frameworks & Technologies</h4>';
                html += '<div class="analysis-item">';
                frameworks.forEach(fw => {
                    html += `<span class="badge">${fw}</span>`;
                });
                html += '</div></div>';
            }
            
            // Skills
            const skills = analysis.skills || [];
            if (skills.length > 0) {
                html += '<div class="analysis-section">';
                html += '<h4>Skills Detected</h4>';
                html += '<div class="analysis-item">';
                skills.forEach(skill => {
                    html += `<span class="badge">${skill}</span>`;
                });
                html += '</div></div>';
            }

            // Document Subject Terms (PDF/Image OCR)
            const docSubjects = analysis.document_subjects || null;
            if (docSubjects && docSubjects.top_terms && docSubjects.top_terms.length > 0) {
                html += '<div class="analysis-section">';
                html += '<h4>Document Subject Terms</h4>';
                html += `<div class="analysis-item"><span class="analysis-label">Files Scanned:</span><span class="analysis-value">${docSubjects.files_scanned || 0} (PDFs: ${docSubjects.pdfs_scanned || 0}, Images: ${docSubjects.images_scanned || 0})</span></div>`;
                if (docSubjects.sample_snippet) {
                    html += `<div class="analysis-item"><span class="analysis-label">Sample Extract:</span><span class="analysis-value">${docSubjects.sample_snippet}</span></div>`;
                }
                html += '<div class="analysis-item">';
                docSubjects.top_terms.forEach(term => {
                    html += `<span class="badge badge-info">${term}</span>`;
                });
                html += '</div></div>';
            }
            
            // Project Structure
            const structure = analysis.project_structure || {};
            if (structure.total_folders !== undefined) {
                html += '<div class="analysis-section">';
                html += '<h4>Project Structure</h4>';
                html += `<div class="analysis-item"><span class="analysis-label">Total Folders:</span><span class="analysis-value">${structure.total_folders}</span></div>`;
                html += `<div class="analysis-item"><span class="analysis-label">Max Depth:</span><span class="analysis-value">${structure.max_depth}</span></div>`;
                const features = [];
                if (structure.has_tests) features.push('Tests');
                if (structure.has_docs) features.push('Documentation');
                if (structure.has_config) features.push('Configuration');
                if (features.length > 0) {
                    html += `<div class="analysis-item"><span class="analysis-label">Features:</span><span class="analysis-value">${features.join(', ')}</span></div>`;
                }
                html += '</div>';
            }
            
            // Contribution Metrics
            const contrib = analysis.contribution_metrics || {};
            if (contrib.code_files !== undefined) {
                html += '<div class="analysis-section">';
                html += '<h4>Contribution Metrics</h4>';
                html += `<div class="analysis-item"><span class="analysis-label">Code Files:</span><span class="analysis-value">${contrib.code_files}</span></div>`;
                html += `<div class="analysis-item"><span class="analysis-label">Test Files:</span><span class="analysis-value">${contrib.test_files || 0}</span></div>`;
                html += `<div class="analysis-item"><span class="analysis-label">Documentation Files:</span><span class="analysis-value">${contrib.documentation_files || 0}</span></div>`;
                html += `<div class="analysis-item"><span class="analysis-label">Configuration Files:</span><span class="analysis-value">${contrib.configuration_files || 0}</span></div>`;
                if (contrib.activity_distribution) {
                    html += '<div class="analysis-item" style="margin-top: 10px;">';
                    html += '<span class="analysis-label">Activity Distribution:</span>';
                    html += '<div style="margin-top: 5px;">';
                    const dist = contrib.activity_distribution;
                    html += `<div>Code: ${dist.code || 0}% | Testing: ${dist.testing || 0}% | Documentation: ${dist.documentation || 0}% | Configuration: ${dist.configuration || 0}%</div>`;
                    html += '</div></div>';
                }
                html += '</div>';
            }
            
            // Deep Analysis (emphasized for local)
            if (analysis.deep_analysis && Object.keys(analysis.deep_analysis).length > 0) {
                html += '<div class="analysis-section analysis-deep">';
                html += '<h4>Deep Code Analysis</h4>';
                const deep = analysis.deep_analysis;
                
                // Code Quality Score
                if (deep.code_quality_summary) {
                    const quality = deep.code_quality_summary;
                    if (quality.average_quality_score) {
                        html += `<div class="analysis-item"><span class="analysis-label">Code Quality Score:</span><span class="analysis-value">${quality.average_quality_score.toFixed(1)}/100</span></div>`;
                    }
                    // Code Quality Strengths
                    if (quality.strengths && quality.strengths.length > 0) {
                        html += '<div class="analysis-item">';
                        html += '<span class="analysis-label">Strengths:</span>';
                        html += '<div style="margin-top: 5px;">';
                        quality.strengths.forEach(strength => {
                            html += `<span class="badge" style="background: #22c55e;">${strength}</span>`;
                        });
                        html += '</div></div>';
                    }
                }
                
                // OOP Principles with Details
                if (deep.oop_principles_summary) {
                    const oop = deep.oop_principles_summary;
                    const oopCount = (oop.abstraction?.count || 0) + (oop.encapsulation?.count || 0) + 
                                    (oop.polymorphism?.count || 0) + (oop.inheritance?.count || 0);
                    if (oopCount > 0) {
                        html += '<div class="analysis-item">';
                        html += '<span class="analysis-label">OOP Principles Detected:</span>';
                        html += '<div style="margin-top: 5px;">';
                        
                        // Abstraction
                        if (oop.abstraction?.count) {
                            html += `<div class="analysis-item">`;
                            html += `<span class="badge">Abstraction (${oop.abstraction.count})</span>`;
                            if (oop.abstraction.examples && oop.abstraction.examples.length > 0) {
                                html += '<div style="margin-top: 5px; font-size: 0.9em;" class="text-muted">';
                                oop.abstraction.examples.slice(0, 2).forEach(ex => {
                                    html += `<div>• ${ex.class || ex.interface || 'Class'}: ${ex.evidence || ''}</div>`;
                                });
                                html += '</div>';
                            }
                            html += '</div>';
                        }
                        
                        // Encapsulation
                        if (oop.encapsulation?.count) {
                            html += `<div class="analysis-item">`;
                            html += `<span class="badge">Encapsulation (${oop.encapsulation.count})</span>`;
                            if (oop.encapsulation.examples && oop.encapsulation.examples.length > 0) {
                                html += '<div style="margin-top: 5px; font-size: 0.9em;" class="text-muted">';
                                oop.encapsulation.examples.slice(0, 2).forEach(ex => {
                                    html += `<div>• ${ex.class || 'Class'}: ${ex.evidence || ''}</div>`;
                                });
                                html += '</div>';
                            }
                            html += '</div>';
                        }
                        
                        // Polymorphism
                        if (oop.polymorphism?.count) {
                            html += `<div class="analysis-item">`;
                            html += `<span class="badge">Polymorphism (${oop.polymorphism.count})</span>`;
                            if (oop.polymorphism.examples && oop.polymorphism.examples.length > 0) {
                                html += '<div style="margin-top: 5px; font-size: 0.9em;" class="text-muted">';
                                oop.polymorphism.examples.slice(0, 2).forEach(ex => {
                                    html += `<div>• ${ex.class || 'Class'}: ${ex.evidence || ''}</div>`;
                                });
                                html += '</div>';
                            }
                            html += '</div>';
                        }
                        
                        // Inheritance
                        if (oop.inheritance?.count) {
                            html += `<div class="analysis-item">`;
                            html += `<span class="badge">Inheritance (${oop.inheritance.count})</span>`;
                            if (oop.inheritance.examples && oop.inheritance.examples.length > 0) {
                                html += '<div style="margin-top: 5px; font-size: 0.9em;" class="text-muted">';
                                oop.inheritance.examples.slice(0, 2).forEach(ex => {
                                    const parents = ex.parent_classes ? ex.parent_classes.join(', ') : (ex.parent || '');
                                    html += `<div>• ${ex.class}: inherits from ${parents}</div>`;
                                });
                                html += '</div>';
                            }
                            html += '</div>';
                        }
                        
                        html += '</div></div>';
                    }
                }
                
                // Data Structures with Performance Notes
                if (deep.data_structure_summary && Object.keys(deep.data_structure_summary).length > 0) {
                    html += '<div class="analysis-item">';
                    html += '<span class="analysis-label">Data Structures Used:</span>';
                    html += '<div style="margin-top: 5px;">';
                    
                    const performanceNotes = {
                        'hash_map': 'O(1) average lookup',
                        'list': 'O(n) search, O(1) append',
                        'set': 'O(1) average membership test',
                        'tree': 'O(log n) search',
                        'array': 'O(1) access, O(n) search'
                    };
                    
                    Object.entries(deep.data_structure_summary).forEach(([struct, count]) => {
                        if (count > 0) {
                            const perfNote = performanceNotes[struct] || '';
                            html += `<div class="analysis-item">`;
                            html += `<span class="badge badge-info">${struct.replace('_', ' ')} (${count})</span>`;
                            if (perfNote) {
                                html += `<span class="perf-note">${perfNote}</span>`;
                            }
                            html += '</div>';
                        }
                    });
                    html += '</div></div>';
                }
                
                // Complexity Analysis
                if (deep.complexity_summary) {
                    const complexity = deep.complexity_summary;
                    const hasComplexity = complexity.nested_loops > 0 || complexity.recursive_functions > 0 || complexity.complexity_awareness;
                    
                    if (hasComplexity) {
                        html += '<div class="analysis-item">';
                        html += '<span class="analysis-label">Complexity Analysis:</span>';
                        html += '<div style="margin-top: 5px;">';
                        
                        if (complexity.nested_loops > 0) {
                            html += `<div class="analysis-item">`;
                            html += `<span class="badge badge-warning">Nested Loops (${complexity.nested_loops})</span>`;
                            html += `<span class="text-muted" style="margin-left: 10px; font-size: 0.9em;">Potential O(n²) or higher complexity</span>`;
                            html += '</div>';
                        }
                        
                        if (complexity.recursive_functions > 0) {
                            html += `<div class="analysis-item">`;
                            html += `<span class="badge badge-purple">Recursive Functions (${complexity.recursive_functions})</span>`;
                            html += `<span class="text-muted" style="margin-left: 10px; font-size: 0.9em;">Demonstrates recursive problem-solving</span>`;
                            html += '</div>';
                        }
                        
                        if (complexity.complexity_awareness) {
                            html += `<div class="analysis-item">`;
                            html += `<span class="badge badge-success">Complexity Awareness</span>`;
                            html += `<span class="text-muted" style="margin-left: 10px; font-size: 0.9em;">Code includes complexity annotations or optimized algorithms</span>`;
                            html += '</div>';
                        }
                        
                        html += '</div></div>';
                    }
                }
                
                // Optimization Evidence
                if (deep.optimization_summary && deep.optimization_summary.length > 0) {
                    html += '<div class="analysis-item">';
                    html += '<span class="analysis-label">Optimizations Detected:</span>';
                    html += '<div style="margin-top: 5px;">';
                    
                    // Group by unique types
                    const uniqueOptimizations = {};
                    deep.optimization_summary.forEach(opt => {
                        const type = opt.type || 'Other';
                        if (!uniqueOptimizations[type]) {
                            uniqueOptimizations[type] = opt;
                        }
                    });
                    
                    Object.values(uniqueOptimizations).forEach(opt => {
                        html += `<div class="analysis-item">`;
                        html += `<span class="badge badge-success">${opt.type}</span>`;
                        html += `<div style="margin-top: 5px; font-size: 0.9em;">`;
                        html += `<div class="text-muted">${opt.evidence}</div>`;
                        if (opt.skill_indicator) {
                            html += `<div class="text-accent" style="margin-top: 3px;">Skill: ${opt.skill_indicator}</div>`;
                        }
                        html += '</div></div>';
                    });
                    
                    html += '</div></div>';
                }
                
                html += '</div>';
            }
            
            return html;
        }

        function switchAnalyzeTab(tab) {
            const tabs = document.querySelectorAll('.analyze-tab');
            const panes = document.querySelectorAll('.analyze-tab-pane');
            tabs.forEach(t => t.classList.toggle('active', t.getAttribute('data-tab') === tab));
            panes.forEach((p, i) => {
                const isLocal = tab === 'local';
                p.classList.toggle('active', (tab === 'local' && p.id === 'analyzeResultLocal') || (tab === 'ai' && p.id === 'analyzeResultAi'));
            });
        }

        async function analyzeProject() {
            if (!selectedProjectId) {
                showMessage('Please select a project', 'error');
                return;
            }
            const resultDiv = document.getElementById('analyzeResultLocal');
            if (!resultDiv) return;
            resultDiv.innerHTML = '<div class="analyze-loading"><div class="spinner"></div><p>Analyzing locally...</p></div>';
            switchAnalyzeTab('local');
            try {
                const res = await apiCall(`/api/projects/${selectedProjectId}/analyze?user_name=${currentUser.user_name}`, { method: 'POST' });
                if (!res.ok) { renderError(resultDiv, res.error || 'Local analysis failed'); return; }
                const data = res.data;
                if (data.success) {
                    resultDiv.innerHTML = formatAnalysisResults(data.analysis);
                    renderSuccess(resultDiv, 'Local analysis complete');
                } else {
                    renderError(resultDiv, data.error || 'Analysis failed');
                }
            } catch (e) {
                renderError(resultDiv, e.message || 'Analysis failed');
            }
        }

            if (!selectedProjectId) {

                return;
            }

        function formatGeminiAnalysis(analysis) {
            let html = '<div class="analysis-section" style="border-left-color: #7c3aed;">';
            html += '<h4 style="color: #7c3aed;">AI Deep Analysis (Gemini)</h4>';
            
            // Project info
            html += `<div class="analysis-item"><span class="analysis-label">Project:</span><span class="analysis-value">${analysis.project_name || 'Unknown'}</span></div>`;
            html += `<div class="analysis-item"><span class="analysis-label">Files Analyzed:</span><span class="analysis-value">${analysis.files_analyzed || 0}</span></div>`;
            html += '</div>';
            
            // Overall Assessment
            const overall = analysis.overall_assessment || {};
            if (overall.quality_score || overall.summary) {
                html += '<div class="analysis-section">';
                html += '<h4>Overall Assessment</h4>';
                if (overall.quality_score) {
                    const scoreColor = overall.quality_score >= 70 ? '#22c55e' : overall.quality_score >= 40 ? '#d97706' : '#dc2626';
                    html += `<div class="analysis-item"><span class="analysis-label">Quality Score:</span><span class="analysis-value" style="color: ${scoreColor}; font-weight: bold; font-size: 1.2em;">${overall.quality_score}/100</span></div>`;
                }
                if (overall.skill_level) {
                    const levelBadge = {
                        'junior': 'badge-info',
                        'mid': 'badge',
                        'senior': 'badge-success',
                        'expert': 'badge-purple'
                    };
                    html += `<div class="analysis-item"><span class="analysis-label">Skill Level:</span><span class="badge ${levelBadge[overall.skill_level] || 'badge'}">${overall.skill_level.toUpperCase()}</span></div>`;
                }
                if (overall.summary) {
                    html += `<div class="analysis-item" style="margin-top: 10px;"><p style="font-style: italic;">"${overall.summary}"</p></div>`;
                }
                html += '</div>';
            }

            // Project Completion
            const completion = analysis.project_completion || {};
            if (completion.status || completion.evidence || completion.missing_or_risks) {
                html += '<div class="analysis-section">';
                html += '<h4>Project Completion</h4>';
                if (completion.status) {
                    const status = completion.status.toUpperCase();
                    const statusColor = status === 'COMPLETE' ? '#22c55e' : status === 'MOSTLY_COMPLETE' ? '#84cc16' : status === 'PARTIAL' ? '#d97706' : '#dc2626';
                    html += `<div class="analysis-item"><span class="analysis-label">Status:</span><span class="analysis-value" style="color: ${statusColor}; font-weight: 600;">${status}</span></div>`;
                }
                if (completion.confidence !== undefined) {
                    html += `<div class="analysis-item"><span class="analysis-label">Confidence:</span><span class="analysis-value">${completion.confidence}</span></div>`;
                }
                if (completion.evidence && completion.evidence.length > 0) {
                    html += '<div class="analysis-item"><span class="analysis-label">Evidence:</span><div style="margin-top: 5px;">';
                    completion.evidence.forEach(item => {
                        html += `<span class="badge">${item}</span>`;
                    });
                    html += '</div></div>';
                }
                if (completion.missing_or_risks && completion.missing_or_risks.length > 0) {
                    html += '<div class="analysis-item"><span class="analysis-label">Missing/Risks:</span><div style="margin-top: 5px;">';
                    completion.missing_or_risks.forEach(item => {
                        html += `<span class="badge" style="background: #d97706;">${item}</span>`;
                    });
                    html += '</div></div>';
                }
                html += '</div>';
            }
            
            // Architecture
            const arch = analysis.architecture || {};
            if (arch.patterns_used || arch.structure_quality) {
                html += '<div class="analysis-section">';
                html += '<h4>Architecture</h4>';
                if (arch.structure_quality) {
                    html += `<div class="analysis-item"><span class="analysis-label">Structure Quality:</span><span class="badge">${arch.structure_quality}</span></div>`;
                }
                if (arch.patterns_used && arch.patterns_used.length > 0) {
                    html += '<div class="analysis-item"><span class="analysis-label">Patterns Used:</span><div style="margin-top: 5px;">';
                    arch.patterns_used.forEach(p => html += `<span class="badge badge-purple">${p}</span>`);
                    html += '</div></div>';
                }
                if (arch.separation_of_concerns) {
                    html += `<div class="analysis-item"><span class="analysis-label">Separation of Concerns:</span><span class="analysis-value">${arch.separation_of_concerns}</span></div>`;
                }
                if (arch.modularity) {
                    html += `<div class="analysis-item"><span class="analysis-label">Modularity:</span><span class="analysis-value">${arch.modularity}</span></div>`;
                }
                html += '</div>';
            }
            
            // Code Quality
            const cq = analysis.code_quality || {};
            if (Object.keys(cq).length > 0) {
                html += '<div class="analysis-section">';
                html += '<h4>Code Quality Metrics</h4>';
                ['readability', 'maintainability', 'error_handling', 'documentation'].forEach(metric => {
                    const m = cq[metric];
                    if (m && m.score) {
                        const barColor = m.score >= 7 ? '#22c55e' : m.score >= 4 ? '#d97706' : '#dc2626';
                        html += `<div class="analysis-item">`;
                        html += `<span class="analysis-label">${metric.charAt(0).toUpperCase() + metric.slice(1).replace('_', ' ')}:</span>`;
                        html += `<div style="display: inline-flex; align-items: center; gap: 10px; margin-left: 10px;">`;
                        html += `<div style="width: 100px; height: 8px; background: var(--border-color); border-radius: 4px;"><div style="width: ${m.score * 10}%; height: 100%; background: ${barColor}; border-radius: 4px;"></div></div>`;
                        html += `<span>${m.score}/10</span>`;
                        html += `</div>`;
                        if (m.observations && m.observations.length > 0) {
                            html += `<div style="margin-top: 5px; font-size: 0.9em;" class="text-muted">`;
                            m.observations.slice(0, 2).forEach(obs => html += `<div>• ${obs}</div>`);
                            html += '</div>';
                        }
                        html += '</div>';
                    }
                });
                html += '</div>';
            }
            
            // Skills Demonstrated
            const skills = analysis.skills_demonstrated || [];
            if (skills.length > 0) {
                html += '<div class="analysis-section">';
                html += '<h4>Skills Demonstrated</h4>';
                skills.forEach(s => {
                    const profColors = {
                        'beginner': '#0284c7',
                        'intermediate': '#d97706',
                        'advanced': '#22c55e',
                        'expert': '#7c3aed'
                    };
                    html += `<div class="analysis-item">`;
                    html += `<span class="badge" style="background: ${profColors[s.proficiency] || '#000'};">${s.skill}</span>`;
                    html += `<span class="text-muted" style="margin-left: 10px; font-size: 0.9em;">${s.proficiency || 'detected'}</span>`;
                    if (s.evidence) {
                        html += `<div style="margin-top: 5px; font-size: 0.85em; color: var(--text-secondary);">Evidence: ${s.evidence}</div>`;
                    }
                    html += '</div>';
                });
                html += '</div>';
            }
            
            // Best Practices
            const bp = analysis.best_practices || {};
            if ((bp.followed && bp.followed.length > 0) || (bp.missing && bp.missing.length > 0)) {
                html += '<div class="analysis-section">';
                html += '<h4>Best Practices</h4>';
                if (bp.followed && bp.followed.length > 0) {
                    html += '<div class="analysis-item"><span class="analysis-label" style="color: #22c55e;">Followed:</span><div style="margin-top: 5px;">';
                    bp.followed.forEach(p => html += `<div style="margin: 3px 0;">✓ ${p}</div>`);
                    html += '</div></div>';
                }
                if (bp.missing && bp.missing.length > 0) {
                    html += '<div class="analysis-item"><span class="analysis-label" style="color: #d97706;">Could Improve:</span><div style="margin-top: 5px;">';
                    bp.missing.forEach(p => html += `<div style="margin: 3px 0;">○ ${p}</div>`);
                    html += '</div></div>';
                }
                html += '</div>';
            }
            
            // Security
            const sec = analysis.security || {};
            if (sec.score || (sec.concerns && sec.concerns.length > 0)) {
                html += '<div class="analysis-section">';
                html += '<h4>Security Assessment</h4>';
                if (sec.score) {
                    const secColor = sec.score >= 7 ? '#22c55e' : sec.score >= 4 ? '#d97706' : '#dc2626';
                    html += `<div class="analysis-item"><span class="analysis-label">Security Score:</span><span style="color: ${secColor}; font-weight: bold;">${sec.score}/10</span></div>`;
                }
                if (sec.concerns && sec.concerns.length > 0) {
                    html += '<div class="analysis-item"><span class="analysis-label">Concerns:</span><div style="margin-top: 5px;" class="text-muted">';
                    sec.concerns.forEach(c => html += `<div>⚠ ${c}</div>`);
                    html += '</div></div>';
                }
                if (sec.recommendations && sec.recommendations.length > 0) {
                    html += '<div class="analysis-item"><span class="analysis-label">Recommendations:</span><div style="margin-top: 5px;">';
                    sec.recommendations.forEach(r => html += `<div>→ ${r}</div>`);
                    html += '</div></div>';
                }
                html += '</div>';
            }
            
            // Performance
            const perf = analysis.performance || {};
            if (perf.score || (perf.observations && perf.observations.length > 0)) {
                html += '<div class="analysis-section">';
                html += '<h4>Performance Analysis</h4>';
                if (perf.score) {
                    html += `<div class="analysis-item"><span class="analysis-label">Performance Score:</span><span class="analysis-value">${perf.score}/10</span></div>`;
                }
                if (perf.observations && perf.observations.length > 0) {
                    html += '<div class="analysis-item"><span class="analysis-label">Observations:</span><div style="margin-top: 5px;" class="text-muted">';
                    perf.observations.forEach(o => html += `<div>• ${o}</div>`);
                    html += '</div></div>';
                }
                if (perf.optimization_opportunities && perf.optimization_opportunities.length > 0) {
                    html += '<div class="analysis-item"><span class="analysis-label">Optimization Opportunities:</span><div style="margin-top: 5px;">';
                    perf.optimization_opportunities.forEach(o => html += `<div>→ ${o}</div>`);
                    html += '</div></div>';
                }
                html += '</div>';
            }
            
            // Recommendations
            const recs = analysis.recommendations || {};
            if (recs.immediate || recs.short_term || recs.long_term) {
                html += '<div class="analysis-section" style="border-left-color: #22c55e;">';
                html += '<h4>Recommendations</h4>';
                if (recs.immediate && recs.immediate.length > 0) {
                    html += '<div class="analysis-item"><span class="badge" style="background: #dc2626;">High Priority</span><div style="margin-top: 5px;">';
                    recs.immediate.forEach(r => html += `<div>• ${r}</div>`);
                    html += '</div></div>';
                }
                if (recs.short_term && recs.short_term.length > 0) {
                    html += '<div class="analysis-item"><span class="badge" style="background: #d97706;">Short Term</span><div style="margin-top: 5px;">';
                    recs.short_term.forEach(r => html += `<div>• ${r}</div>`);
                    html += '</div></div>';
                }
                if (recs.long_term && recs.long_term.length > 0) {
                    html += '<div class="analysis-item"><span class="badge" style="background: #0284c7;">Long Term</span><div style="margin-top: 5px;">';
                    recs.long_term.forEach(r => html += `<div>• ${r}</div>`);
                    html += '</div></div>';
                }
                html += '</div>';
            }
            
            // Notable Code
            const notable = analysis.notable_code || [];
            if (notable.length > 0) {
                html += '<div class="analysis-section">';
                html += '<h4>Notable Code</h4>';
                notable.forEach(n => {
                    html += '<div class="analysis-item">';
                    html += `<strong>${n.description}</strong>`;
                    if (n.file) html += ` <span class="text-muted">(${n.file})</span>`;
                    if (n.why_notable) html += `<div style="margin-top: 5px; font-size: 0.9em;">${n.why_notable}</div>`;
                    html += '</div>';
                });
                html += '</div>';
            }
            
            // Raw analysis fallback
            if (analysis.raw_analysis && !analysis.overall_assessment?.quality_score) {
                html += '<div class="analysis-section">';
                html += '<h4>Analysis Output</h4>';
                html += `<pre style="white-space: pre-wrap; font-size: 0.9em;">${analysis.raw_analysis}</pre>`;
                html += '</div>';
            }
            
            return html;
        }

        async function rankProjects() {
            const resultDiv = document.getElementById('rankResult');
            const saveBtn = document.getElementById('rankSaveBtn');
            if (!resultDiv) return;
            resultDiv.innerHTML = '<div class="rank-loading text-muted">Ranking...</div>';
            if (saveBtn) saveBtn.disabled = true;
            try {
                const res = await apiCall(`/api/projects/rank?user_name=${encodeURIComponent(currentUser.user_name || '')}`, { method: 'POST' });
                if (!res.ok) { renderError(resultDiv, res.error || 'Failed to rank projects'); return; }
                const data = res.data;
                if (!data || !data.success) {
                    resultDiv.innerHTML = '<div class="message error">Failed to rank projects.</div>';
                    return;
                }
                const ranked = data.ranked_projects || [];
                lastRankedProjects = ranked;
                if (saveBtn) saveBtn.disabled = ranked.length === 0;
                if (ranked.length === 0) {
                    resultDiv.innerHTML = '<div class="rank-empty text-muted">No projects to rank. Upload projects first.</div>';
                    return;
                }
                let html = '<div class="rank-list">';
                html += '<div class="analysis-section"><h4>Project rankings</h4>';
                ranked.forEach((p, i) => {
                    const score = typeof p.score === 'number' ? p.score.toFixed(2) : p.score;
                    const scoreColor = p.score >= 70 ? 'var(--success, #22c55e)' : p.score >= 40 ? 'var(--warning, #d97706)' : 'var(--danger, #dc2626)';
                    html += '<div class="analysis-item rank-item">';
                    html += '<div class="rank-item-row">';
                    html += '<span class="rank-position">' + (i + 1) + '.</span>';
                    html += '<span class="rank-filename">' + escapeHtml(p.filename || 'Project') + '</span>';
                    html += '<span class="rank-score" style="color:' + scoreColor + ';font-weight:700;">' + escapeHtml(String(score)) + '</span>';
                    html += '</div>';
                    html += '</div>';
                });
                html += '</div></div>';
                resultDiv.innerHTML = html;
                showMessage('Ranking complete. Click "Save to database" to store these rankings.', 'success');
            } catch (e) {
                renderError(resultDiv, e.message || 'Ranking failed');
            }
        }

        async function saveRankingsToDb() {
            if (!lastRankedProjects || lastRankedProjects.length === 0) {
                showMessage('No rankings to save. Rank projects first.', 'error');
                return;
            }
            const user = currentUser?.user_name;
            if (!user) {
                showMessage('You must be logged in to save rankings.', 'error');
                return;
            }
            try {
                const res = await apiCall(`/api/projects/rankings/save?user_name=${encodeURIComponent(user)}`, {
                    method: 'POST',
                    body: JSON.stringify({ ranked_projects: lastRankedProjects }),
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = res.ok && res.data ? res.data : null;
                if (data && data.success) {
                    showMessage(data.message || 'Rankings saved to database.', 'success');
                } else {
                    showMessage((data && data.detail) || res.error || 'Failed to save rankings', 'error');
                }
            } catch (e) {
                showMessage(e.message || 'Error saving rankings', 'error');
            }
        }

                    html += '<div class="rank-item-row">';
                    html += '<span class="rank-position">' + (i + 1) + '.</span>';
                    html += '<span class="rank-filename">' + escapeHtml(p.filename || 'Project') + '</span>';
                    html += '<span class="rank-score" style="color:' + scoreColor + ';font-weight:700;">' + escapeHtml(String(score)) + '</span>';

        async function loadRankings() {
            const resultDiv = document.getElementById('rankingsList');
            if (!resultDiv) return;
            resultDiv.innerHTML = '<div class="rank-loading text-muted">Loading rankings...</div>';
            try {
                const res = await apiCall('/api/projects/rankings');
                if (!res.ok) { renderError(resultDiv, res.error || "Failed to load rankings"); return; }
                const data = res.data;
                const list = (data && data.rankings) ? data.rankings : [];
                if (list.length === 0) {
                    resultDiv.innerHTML = '<div class="rank-empty text-muted">No rankings found. Rank projects and save to database first.</div>';
                    return;
                }
                let html = '<div class="rank-list"><div class="analysis-section"><h4>Stored rankings</h4>';
                list.forEach(r => {
                    const score = typeof r.score === 'number' ? r.score.toFixed(2) : r.score;
                    const scoreColor = r.score >= 70 ? 'var(--success, #22c55e)' : r.score >= 40 ? 'var(--warning, #d97706)' : 'var(--danger, #dc2626)';
                    const filename = (r.ranking_data && r.ranking_data.filename) ? r.ranking_data.filename : 'Project ' + r.project_id;
                    const summaryStr = (r.summary && String(r.summary).trim()) ? String(r.summary).trim() : '';
                    const summary = summaryStr ? summaryStr.slice(0, 120) + (summaryStr.length > 120 ? '…' : '') : '';
                    html += '<div class="analysis-item rank-item">';
                    html += '<div class="rank-item-row">';
                    html += '<span class="rank-position">' + r.rank_position + '.</span>';
                    html += '<span class="rank-filename">' + escapeHtml(filename) + '</span>';
                    html += '<span class="rank-score" style="color:' + scoreColor + ';font-weight:700;">' + escapeHtml(String(score)) + '</span>';
                    html += '</div>';
                    if (summary) html += '<div class="rank-summary text-muted">' + escapeHtml(summary) + '</div>';
                    html += '</div>';
                });
                html += '</div></div>';
                resultDiv.innerHTML = html;
            } catch (e) {
                resultDiv.innerHTML = '<div class="message error">' + escapeHtml(e.message || 'Error loading rankings') + '</div>';
            }
        }
