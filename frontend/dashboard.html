<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artifact - Dashboard</title>
    <style>
        /* Light Mode (Default) */
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --bg-card: #fafafa;
            --accent-primary: #000000;
            --accent-hover: #333333;
            --text-primary: #000000;
            --text-secondary: #555555;
            --text-muted: #888888;
            --border-color: #e0e0e0;
            --error-color: #dc2626;
            --success-color: #16a34a;
            --badge-bg: #000000;
            --badge-text: #ffffff;
        }

        /* Dark Mode */
        [data-theme="dark"] {
            --bg-primary: #000000;
            --bg-secondary: #111111;
            --bg-card: #0a0a0a;
            --accent-primary: #ffffff;
            --accent-hover: #cccccc;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --text-muted: #777777;
            --border-color: #333333;
            --error-color: #ef4444;
            --success-color: #22c55e;
            --badge-bg: #ffffff;
            --badge-text: #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: var(--bg-primary); color: var(--text-primary); padding: 20px; transition: background 0.3s, color 0.3s; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 15px; background: var(--bg-secondary); border-radius: 8px; border: 1px solid var(--border-color); }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .menu-btn { padding: 15px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-primary); cursor: pointer; text-align: left; transition: all 0.2s; font-size: 14px; }
        .menu-btn:hover { background: var(--bg-secondary); border-color: var(--accent-primary); }
        .menu-group { display: flex; flex-direction: column; gap: 8px; position: relative; }
        .submenu-grid { display: none; position: absolute; top: calc(100% + 6px); left: 0; width: 100%; z-index: 10; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 8px; padding: 6px; background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 8px; box-shadow: 0 6px 18px rgba(0,0,0,0.08); }
        .submenu-grid.open { display: grid; }
        .submenu-btn { padding: 12px; font-size: 13px; }
        .menu-btn.caret::after { content: "▾"; float: right; color: var(--text-muted); }
        .menu-btn.caret.open::after { content: "▴"; }
        .view-panel { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 8px; padding: 20px; margin-top: 20px; }
        .view-panel h3 { margin-bottom: 15px; color: var(--text-primary); }
        .btn { padding: 10px 20px; background: var(--accent-primary); border: none; border-radius: 6px; color: var(--bg-primary); cursor: pointer; margin: 5px; font-weight: 500; transition: all 0.2s; }
        .btn:hover { background: var(--accent-hover); }
        .btn-secondary { background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border-color); }
        .btn-secondary:hover { background: var(--bg-secondary); border-color: var(--accent-primary); }
        input[type="file"], input[type="text"] { padding: 8px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-primary); width: 100%; margin: 5px 0; }
        .project-list { max-height: 400px; overflow-y: auto; border: 1px solid var(--border-color); border-radius: 6px; padding: 10px; margin: 10px 0; background: var(--bg-card); }
        .project-item { padding: 10px; border-bottom: 1px solid var(--border-color); cursor: pointer; transition: background 0.2s; }
        .project-item:hover { background: var(--bg-secondary); }
        .project-item.selected { background: var(--bg-secondary); border-left: 3px solid var(--accent-primary); }
        .project-row { display: flex; flex-direction: row; gap: 12px; align-items: center; }
        .project-info { flex: 1; min-width: 0; }
        .project-thumbnail { width: 96px; height: 96px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-secondary); }
        .message { padding: 12px; border-radius: 6px; margin: 10px 0; }
        .message.error { background: rgba(220, 38, 38, 0.1); border: 1px solid rgba(220, 38, 38, 0.3); color: var(--error-color); }
        .message.success { background: rgba(22, 163, 74, 0.1); border: 1px solid rgba(22, 163, 74, 0.3); color: var(--success-color); }
        .result { margin-top: 15px; padding: 15px; background: var(--bg-card); border-radius: 6px; white-space: pre-wrap; border: 1px solid var(--border-color); }
        .analysis-section { margin: 15px 0; padding: 15px; background: var(--bg-card); border-radius: 6px; border-left: 3px solid var(--accent-primary); }
        .analysis-section h4 { color: var(--text-primary); margin-bottom: 10px; font-size: 1.1em; font-weight: 600; }
        .analysis-item { margin: 8px 0; padding: 8px; background: var(--bg-secondary); border-radius: 4px; }
        .analysis-label { color: var(--text-secondary); font-weight: 600; }
        .analysis-value { color: var(--text-primary); margin-left: 10px; }
        .analysis-list { list-style: none; padding-left: 0; }
        .analysis-list li { padding: 5px 0; border-bottom: 1px solid var(--border-color); }
        .analysis-list li:last-child { border-bottom: none; }
        .badge { display: inline-block; padding: 4px 8px; background: var(--badge-bg); color: var(--badge-text); border-radius: 4px; font-size: 0.85em; margin: 2px; font-weight: 500; }
        .badge-success { background: #16a34a; color: #ffffff; }
        .badge-warning { background: #d97706; color: #ffffff; }
        .badge-info { background: #0284c7; color: #ffffff; }
        .badge-purple { background: #7c3aed; color: #ffffff; }
        .text-muted { color: var(--text-muted); }
        .text-accent { color: var(--accent-primary); }
        .perf-note { margin-left: 10px; color: #16a34a; font-size: 0.9em; font-weight: 500; }
        
        /* Theme Toggle Button */
        .theme-toggle { 
            background: var(--bg-card); 
            border: 1px solid var(--border-color); 
            border-radius: 6px; 
            padding: 8px 12px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 6px;
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.2s;
        }
        .theme-toggle:hover { background: var(--bg-secondary); border-color: var(--accent-primary); }
        .theme-toggle svg { width: 18px; height: 18px; }
        
        /* Loading Spinner */
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: #7c3aed;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h1>Artifact Dashboard - <span id="username"></span></h1>
        </div>
        <div style="display: flex; gap: 10px; align-items: center;">
            <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle">
                <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                </svg>
                <span id="themeLabel">Dark</span>
            </button>
            <button class="btn btn-secondary" onclick="logout()">Sign Out</button>
        </div>
    </div>
    
    <div id="messageBox" class="message" style="display: none;"></div>
    
    <div class="menu-grid">
        <div class="menu-group">
            <button class="menu-btn caret" id="projectMenuToggle" onclick="toggleSubmenu('projectSubmenu', 'projectMenuToggle')">Project Actions</button>
            <div class="submenu-grid" id="projectSubmenu">
                <button class="menu-btn submenu-btn" onclick="showView('upload')">1. Upload ZIP</button>
                <button class="menu-btn submenu-btn" onclick="showView('list')">2. List Projects</button>
                <button class="menu-btn submenu-btn" onclick="showView('analyze')">3. Analyze Project</button>
                <button class="menu-btn submenu-btn" onclick="showView('thumbnail')">15. Add Thumbnail</button>
                <button class="menu-btn submenu-btn" onclick="showView('merge')">17. Merge ZIP into Project</button>
            </div>
        </div>
        <div class="menu-group">
            <button class="menu-btn caret" id="rankingMenuToggle" onclick="toggleSubmenu('rankingSubmenu', 'rankingMenuToggle')">Ranking Tools</button>
            <div class="submenu-grid" id="rankingSubmenu">
                <button class="menu-btn submenu-btn" onclick="showView('rank')">4. Rank Projects</button>
                <button class="menu-btn submenu-btn" onclick="showView('rank-top3')">5. Rank Top 3</button>
                <button class="menu-btn submenu-btn" onclick="showView('rankings')">6. View Rankings</button>
                <button class="menu-btn submenu-btn" onclick="showView('rank-gemini')">7. AI Rank (Gemini)</button>
            </div>
        </div>
        <div class="menu-group">
            <button class="menu-btn caret" id="settingsMenuToggle" onclick="toggleSubmenu('settingsSubmenu', 'settingsMenuToggle')">Settings</button>
            <div class="submenu-grid" id="settingsSubmenu">
                <button class="menu-btn submenu-btn" onclick="showView('external')">7. External Services</button>
                <button class="menu-btn submenu-btn" onclick="showView('cleanup')">8. Cleanup Insights</button>
                <button class="menu-btn submenu-btn" onclick="showView('preferences')">9. Preferences</button>
                <button class="menu-btn submenu-btn" onclick="showView('account')">10. Account</button>
            </div>
        </div>
        <div class="menu-group">
            <button class="menu-btn caret" id="resumeMenuToggle" onclick="toggleSubmenu('resumeSubmenu', 'resumeMenuToggle')">Resume Tools</button>
            <div class="submenu-grid" id="resumeSubmenu">
                <button class="menu-btn submenu-btn" onclick="showView('resume-gen')">11. Generate Resume</button>
                <button class="menu-btn submenu-btn" onclick="showView('resume-view')">12. View Resume</button>
                <button class="menu-btn submenu-btn" onclick="showView('resume-delete')">13. Delete Resume</button>
            </div>
        </div>
        <button class="menu-btn" onclick="showView('portfolio')">14. View Portfolio</button>
        <button class="menu-btn" onclick="showView('llm-summary')">16. LLM Summary</button>
    </div>
    
    <div id="viewContainer"></div>

    <script>
        const API_BASE_URL = window.location.origin;
        let currentUser = null;
        let projects = [];
        let selectedProjectId = null;

        // Dashboard State Persistence
        const DASHBOARD_STATE_KEY = 'dashboard_state_v1';

        function loadDashboardState() {
            try {
                const raw = localStorage.getItem(DASHBOARD_STATE_KEY);
                return raw ? JSON.parse(raw) : null;
            } catch {
                return null;
            }
        }

        function saveDashboardState(patch) {
            const prev = loadDashboardState() || {};
            const next = { ...prev, ...patch, updated_at: new Date().toISOString() };
            localStorage.setItem(DASHBOARD_STATE_KEY, JSON.stringify(next));
            return next;
        }

        function clearDashboardState() {
            localStorage.removeItem(DASHBOARD_STATE_KEY);
        }

        // Check auth on load
        document.addEventListener('DOMContentLoaded', async () => {
            const storedUser = localStorage.getItem('user');
            if (!storedUser) {
                window.location.href = 'index.html';
                return;
            }
            try {
                currentUser = JSON.parse(storedUser);
                document.getElementById('username').textContent = currentUser.user_name;

                await loadProjects();

                // restore view + selection
                const state = loadDashboardState();
                const view = state?.activeView || 'list';
                selectedProjectId = state?.selectedProjectId || null;

                showView(view, { preserveSelection: true });
            } catch (e) {
                localStorage.removeItem('user');
                window.location.href = 'index.html';
            }
        });
        
        document.addEventListener('click', (e) => {
            const item = e.target.closest('.project-item');
            if (!item) return;

            const projectId = item.dataset.projectId;
            const containerId = item.dataset.containerId;
            const onSelect = item.dataset.onSelect;

            selectProject(e, Number(projectId), containerId, onSelect);
        });

        function showMessage(text, type) {
            const msg = document.getElementById('messageBox');
            msg.textContent = text;
            msg.className = `message ${type}`;
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 5000);
        }

        async function apiCall(endpoint, options = {}) {
            try {
                const response = await fetch(`${API_BASE_URL}${endpoint}`, {
                    headers: { 'Content-Type': 'application/json', ...options.headers },
                    ...options
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.detail || 'Request failed');
                return data;
            } catch (e) {
                showMessage(e.message || 'Request failed', 'error');
                throw e;
            }
        }

        // Multipurpose API request function that can handle JSON and FormData bodies, and provides consistent error handling
        async function apiRequest(endpoint, { method = 'GET', body = null, headers = {} } = {}) {
            const opts = { method, headers: { ...headers } };

            const isFormData = body instanceof FormData;

            if (body) {
                opts.body = body;
                if (!isFormData) {
                    opts.headers['Content-Type'] = 'application/json';
                }
            }

            const response = await fetch(`${API_BASE_URL}${endpoint}`, opts);

            // try to parse JSON, but fallback to text if not possible
            const contentType = response.headers.get('content-type') || '';
            const payload = contentType.includes('application/json') ? await response.json() : await response.text();

            if (!response.ok) {
                const msg =
                    (payload && typeof payload === 'object' && (payload.detail || payload.message)) ||
                    (typeof payload === 'string' ? payload : 'Request failed');
                showMessage(msg, 'error');
                throw new Error(msg);
            }

            return payload;
        }

        async function loadProjectThumbnail(projectId, imgEl) {
            try {
                const data = await apiCall(`/api/projects/${projectId}/thumbnail?user_name=${currentUser.user_name}`);
                if (data.success && data.has_thumbnail && data.thumbnail_data) {
                    imgEl.src = data.thumbnail_data;
                } else {
                    imgEl.remove();
                }
            } catch (e) {
                imgEl.remove();
            }
        }

        async function loadProjects() {
            try {
                const data = await apiCall(`/api/projects?user_name=${currentUser.user_name}`);
                if (data.success) projects = data.projects || [];
            } catch (e) {
                console.error('Failed to load projects:', e);
            }
        }

        function refreshProjectListsWithThumbnails() {
            const listId = 'projectsList';
            const analyzeId = 'analyzeProjectsList';
            const thumbnailId = 'thumbnailProjectsList';
            if (document.getElementById(listId)) {
                renderProjectsList(listId, 'onProjectSelect', true);
            }
            if (document.getElementById(analyzeId)) {
                renderProjectsList(analyzeId, 'onProjectSelect', true);
            }
            if (document.getElementById(thumbnailId)) {
                renderProjectsList(thumbnailId, 'onProjectSelect', true);
            }
        }

        async function getProjectDetails(id) {
            try {
                return await apiCall(`/api/projects/${id}?user_name=${currentUser.user_name}`);
            } catch (e) {
                return null;
            }
        }

        function toggleSubmenu(submenuId, toggleId) {
            const submenu = document.getElementById(submenuId);
            const toggle = document.getElementById(toggleId);
            const isOpen = submenu.classList.toggle('open');
            toggle.classList.toggle('open', isOpen);
        }

        async function submitPrivacyConsent(consentGiven) {
            try {
                const data = await apiCall('/api/privacy-consent', {
                    method: 'POST',
                    body: JSON.stringify({
                        consent_given: consentGiven,
                        user_id: currentUser.user_id || currentUser.user_name
                    })
                });
                if (data.success) {
                    showMessage(`Privacy consent ${consentGiven ? 'granted' : 'denied'}`, 'success');
                }
                return data;
            } catch (e) {
                return null;
            }
        }

        function renderProjectsList(containerId, onSelect, showThumbnails = false) {
            const container = document.getElementById(containerId);
            if (!projects.length) {
                container.innerHTML = '<p>No projects found</p>';
                return;
            }
            container.innerHTML = projects.map(p => 
                `<div class="project-item"
                    onclick="selectProject(event, ${p.id}, '${containerId}', '${onSelect}')"
                    data-project-id="${p.id}"
                    data-container-id="${containerId}"
                    data-on-select="${onSelect}">
                    <div class="project-row">
                        ${showThumbnails && p.has_thumbnail ? `<img class="project-thumbnail" data-project-id="${p.id}" alt="Thumbnail for ${p.filename}" />` : ''}
                        <div class="project-info">
                            <strong>${p.filename}</strong> (ID: ${p.id})<br>
                            <small>Files: ${p.file_count || 0} | Created: ${new Date(p.created_at).toLocaleDateString()}</small>
                        </div>
                    </div>
                </div>`
            ).join('');

            if (showThumbnails) {
                container.querySelectorAll('.project-thumbnail').forEach(img => {
                    const projectId = img.getAttribute('data-project-id');
                    if (projectId) {
                        loadProjectThumbnail(projectId, img);
                    }
                });
            }
        }

        function selectProject(evt, id, containerId, callback) {
            selectedProjectId = id;
            saveDashboardState({ selectedProjectId: id });

            document.querySelectorAll(`#${containerId} .project-item`).forEach(el => el.classList.remove('selected'));

            const item = evt?.target?.closest?.('.project-item');
            if (item) item.classList.add('selected');

            if (window[callback]) window[callback](id);
        }

        function showView(viewName, options = {}) {
            const { preserveSelection = false } = options;
            const container = document.getElementById('viewContainer');
            
            // If not preserving selection, clear selected project and update state
            if (!preserveSelection) {
                selectedProjectId = null;
                saveDashboardState({ selectedProjectId: null });
            }
            saveDashboardState({ activeView: viewName });
            
            const views = {
                'upload': `<div class="view-panel"><h3>Upload ZIP File</h3><input type="file" id="zipFile" accept=".zip" /><button class="btn" onclick="uploadFile()">Upload</button><div id="uploadResult"></div></div>`,
                'list': `<div class="view-panel"><h3>Stored Projects</h3><button class="btn" onclick="refreshProjects()">Refresh</button><button class="btn btn-secondary" onclick="loadSkills()">View Skills</button><div id="projectsList" class="project-list"></div><div id="skillsResult" class="result"></div></div>`,
                'analyze': `<div class="view-panel"><h3>Analyze Project</h3><div id="analyzeProjectsList" class="project-list"></div><div style="margin: 10px 0;"><button class="btn" onclick="analyzeProject()">Local Analysis</button><button class="btn" onclick="analyzeProjectGemini()">AI Deep Analysis (Gemini)</button></div><p class="text-muted" style="font-size: 0.9em; margin-bottom: 10px;">Local: Fast pattern-based analysis | AI: Thorough semantic analysis with recommendations</p><div id="analyzeResult" class="result"></div></div>`,
                'rank': `<div class="view-panel"><h3>Rank All Projects</h3><button class="btn" onclick="rankProjects()">Rank Projects</button><div id="rankResult" class="result"></div></div>`,
                'rank-top3': `<div class="view-panel"><h3>Rank and Summarize Top 3</h3><button class="btn" onclick="rankTop3()">Rank & Summarize</button><div id="rankTop3Result" class="result"></div></div>`,
                'rankings': `<div class="view-panel"><h3>View and Edit Rankings</h3><button class="btn" onclick="loadRankings()">Load Rankings</button><div id="rankingsList" class="result"></div></div>`,
                'rank-gemini': `<div class="view-panel"><h3>AI Rank Projects (Gemini)</h3><p class="text-muted" style="font-size:0.9em;">Uses Gemini AI to comparatively rank all your projects by quality, complexity, and skills.</p><button class="btn" onclick="rankProjectsGemini()">Rank with Gemini</button><div id="rankGeminiResult" class="result"></div></div>`,
                'external': `<div class="view-panel"><h3>External Service Settings</h3><p>Manage external service permissions</p><div id="externalServicesResult" class="result"></div></div>`,
                'cleanup': `<div class="view-panel"><h3>Cleanup Insights</h3><div id="cleanupProjectsList" class="project-list"></div><button class="btn" onclick="cleanupInsights()">Cleanup Selected</button><div id="cleanupResult" class="result"></div></div>`,
                'preferences': `<div class="view-panel"><h3>User Preferences</h3><label>Privacy Consent:</label><button class="btn" onclick="submitPrivacyConsent(true)">Grant</button><button class="btn btn-secondary" onclick="submitPrivacyConsent(false)">Deny</button><label>Git Username:</label><input type="text" id="gitUsername" /><button class="btn" onclick="savePreferences()">Save</button><div id="preferencesResult" class="result"></div></div>`,
                'account': `<div class="view-panel"><h3>User Account</h3><p>Username: ${currentUser?.user_name || ''}</p><p>User ID: ${currentUser?.user_id || ''}</p><p>Last Login: ${new Date(currentUser?.last_login_time).toLocaleString()}</p></div>`,
                'resume-gen': `<div class="view-panel"><h3>Generate Resume</h3><button class="btn" onclick="generateResume()">Generate</button><div id="resumeGenResult" class="result"></div></div>`,
                'resume-view': `<div class="view-panel"><h3>View Resume</h3><button class="btn" onclick="viewResume()">Load Resume</button><div id="resumeViewResult" class="result"></div></div>`,
                'resume-delete': `<div class="view-panel"><h3>Delete Resume</h3><button class="btn" onclick="deleteResume()">Delete</button><div id="resumeDeleteResult" class="result"></div></div>`,
                'portfolio': `<div class="view-panel"><h3>View Portfolio</h3><button class="btn" onclick="viewPortfolio()">Load Portfolio</button><button class="btn btn-secondary" onclick="generatePortfolio()">Generate New</button><div id="portfolioResult" class="result"></div></div>`,
                'thumbnail': `<div class="view-panel"><h3>Add Thumbnail to Project</h3><div id="thumbnailProjectsList" class="project-list"></div><input type="file" id="thumbnailFile" accept="image/*" /><button class="btn" onclick="addThumbnail()">Upload Thumbnail</button><div id="thumbnailResult" class="result"></div></div>`,
                'llm-summary': `<div class="view-panel"><h3>Run LLM Summary</h3><div id="llmProjectsList" class="project-list"></div><button class="btn" onclick="runLLMSummary()">Run Summary</button><div id="llmSummaryResult" class="result"></div></div>`,
                'merge': `<div class="view-panel"><h3>Merge ZIP into Existing Project</h3><p class="text-muted" style="margin-bottom: 15px;">Add new files from another ZIP archive to an existing project. This allows incremental additions to your portfolio or résumé. Duplicate files (same path) will be automatically skipped.</p><div id="mergeProjectsList" class="project-list"></div><input type="file" id="mergeZipFile" accept=".zip" style="margin-top: 10px;" /><button class="btn" onclick="mergeZipToProject()">Merge Files</button><div id="mergeResult" class="result"></div></div>`
            };
            
            container.innerHTML = views[viewName] || '<div class="view-panel"><p>View not found</p></div>';
            
            if (viewName === 'list' || viewName === 'analyze' || 
                viewName === 'cleanup' || viewName === 'thumbnail' || viewName === 'llm-summary' || viewName === 'merge') {
                setTimeout(() => {
                    let listId = null;
                    listId = viewName === 'list' ? 'projectsList' : 
                                  viewName === 'analyze' ? 'analyzeProjectsList' :
                                  viewName === 'cleanup' ? 'cleanupProjectsList' :
                                  viewName === 'thumbnail' ? 'thumbnailProjectsList' :
                                  viewName === 'merge' ? 'mergeProjectsList' : 'llmProjectsList';
                    const showThumbs = viewName === 'list' || viewName === 'analyze' || viewName === 'thumbnail' || viewName === 'merge';
                    renderProjectsList(listId, 'onProjectSelect', showThumbs);
                }, 100);

                const state = loadDashboardState();
                const restoreId = state?.selectedProjectId;
                if (restoreId) {
                    // restore selection based on saved project ID
                    const containerEl = document.getElementById(listId);
                    const items = containerEl?.querySelectorAll?.('.project-item') || [];
                    items.forEach(el => el.classList.remove('selected'));

                    // find the item with matching project ID in its onclick attribute
                    const match = Array.from(items).find(el => (el.getAttribute('onclick') || '').includes(`, ${restoreId},`));
                    if (match) match.classList.add('selected');

                    selectedProjectId = restoreId;
                }
            }
        }

        async function uploadFile() {
            const fileInput = document.getElementById('zipFile');
            const resultDiv = document.getElementById('uploadResult');
            if (!fileInput?.files[0]) {
                showMessage('Please select a file', 'error');
                return;
            }
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            resultDiv.innerHTML = 'Uploading...';
            try {
                const data = await apiRequest(`/api/projects/upload?user_name=${currentUser.user_name}`, {
                    method: 'POST',
                    body: formData
                });
                if (data.success) {
                    resultDiv.innerHTML = `Upload successful! Project ID: ${data.project_id}`;
                    showMessage('Upload successful!', 'success');
                    loadProjects();
                } else {
                    resultDiv.innerHTML = data.message || 'Upload failed';
                    showMessage('Upload failed', 'error');
                }
            } catch (e) {
                resultDiv.innerHTML = `Error: ${e.message}`;
                showMessage('Upload error', 'error');
            }
        }

            loadProjects().then(() => {

            const cq = analysis.code_quality || {};
            if (Object.keys(cq).length > 0) {
                html += '<div class="analysis-section">';
                html += '<h4>Code Quality Metrics</h4>';
                ['readability', 'maintainability', 'error_handling', 'documentation'].forEach(metric => {
                    const m = cq[metric];
                    if (m && m.score) {
                        const barColor = m.score >= 7 ? '#22c55e' : m.score >= 4 ? '#d97706' : '#dc2626';
                        html += `<div class="analysis-item">`;
                        html += `<span class="analysis-label">${metric.charAt(0).toUpperCase() + metric.slice(1).replace('_', ' ')}:</span>`;
                        html += `<div style="display: inline-flex; align-items: center; gap: 10px; margin-left: 10px;">`;
                        html += `<div style="width: 100px; height: 8px; background: var(--border-color); border-radius: 4px;"><div style="width: ${m.score * 10}%; height: 100%; background: ${barColor}; border-radius: 4px;"></div></div>`;
                        html += `<span>${m.score}/10</span>`;
                        html += `</div>`;
                        if (m.observations && m.observations.length > 0) {
                            html += `<div style="margin-top: 5px; font-size: 0.9em;" class="text-muted">`;
                            m.observations.slice(0, 2).forEach(obs => html += `<div>• ${obs}</div>`);
                            html += '</div>';
                        }
                        html += '</div>';
                    }
                });
                html += '</div>';
            }
            
            // Skills Demonstrated
            const skills = analysis.skills_demonstrated || [];
            if (skills.length > 0) {
                html += '<div class="analysis-section">';
                html += '<h4>Skills Demonstrated</h4>';
                skills.forEach(s => {
                    const profColors = {
                        'beginner': '#0284c7',
                        'intermediate': '#d97706',
                        'advanced': '#22c55e',
                        'expert': '#7c3aed'
                    };
                    html += `<div class="analysis-item">`;
                    html += `<span class="badge" style="background: ${profColors[s.proficiency] || '#000'};">${s.skill}</span>`;
                    html += `<span class="text-muted" style="margin-left: 10px; font-size: 0.9em;">${s.proficiency || 'detected'}</span>`;
                    if (s.evidence) {
                        html += `<div style="margin-top: 5px; font-size: 0.85em; color: var(--text-secondary);">Evidence: ${s.evidence}</div>`;
                    }
                    html += '</div>';
                });
                html += '</div>';
            }
            
            // Best Practices
            const bp = analysis.best_practices || {};
            if ((bp.followed && bp.followed.length > 0) || (bp.missing && bp.missing.length > 0)) {
                html += '<div class="analysis-section">';
                html += '<h4>Best Practices</h4>';
                if (bp.followed && bp.followed.length > 0) {
                    html += '<div class="analysis-item"><span class="analysis-label" style="color: #22c55e;">Followed:</span><div style="margin-top: 5px;">';
                    bp.followed.forEach(p => html += `<div style="margin: 3px 0;">✓ ${p}</div>`);
                    html += '</div></div>';
                }
                if (bp.missing && bp.missing.length > 0) {
                    html += '<div class="analysis-item"><span class="analysis-label" style="color: #d97706;">Could Improve:</span><div style="margin-top: 5px;">';
                    bp.missing.forEach(p => html += `<div style="margin: 3px 0;">○ ${p}</div>`);
                    html += '</div></div>';
                }
                html += '</div>';
            }
            
            // Security
            const sec = analysis.security || {};
            if (sec.score || (sec.concerns && sec.concerns.length > 0)) {
                html += '<div class="analysis-section">';
                html += '<h4>Security Assessment</h4>';
                if (sec.score) {
                    const secColor = sec.score >= 7 ? '#22c55e' : sec.score >= 4 ? '#d97706' : '#dc2626';
                    html += `<div class="analysis-item"><span class="analysis-label">Security Score:</span><span style="color: ${secColor}; font-weight: bold;">${sec.score}/10</span></div>`;
                }
                if (sec.concerns && sec.concerns.length > 0) {
                    html += '<div class="analysis-item"><span class="analysis-label">Concerns:</span><div style="margin-top: 5px;" class="text-muted">';
                    sec.concerns.forEach(c => html += `<div>⚠ ${c}</div>`);
                    html += '</div></div>';
                }
                if (sec.recommendations && sec.recommendations.length > 0) {
                    html += '<div class="analysis-item"><span class="analysis-label">Recommendations:</span><div style="margin-top: 5px;">';
                    sec.recommendations.forEach(r => html += `<div>→ ${r}</div>`);
                    html += '</div></div>';
                }
                html += '</div>';
            }
            
            // Performance
            const perf = analysis.performance || {};
            if (perf.score || (perf.observations && perf.observations.length > 0)) {
                html += '<div class="analysis-section">';
                html += '<h4>Performance Analysis</h4>';
                if (perf.score) {
                    html += `<div class="analysis-item"><span class="analysis-label">Performance Score:</span><span class="analysis-value">${perf.score}/10</span></div>`;
                }
                if (perf.observations && perf.observations.length > 0) {
                    html += '<div class="analysis-item"><span class="analysis-label">Observations:</span><div style="margin-top: 5px;" class="text-muted">';
                    perf.observations.forEach(o => html += `<div>• ${o}</div>`);
                    html += '</div></div>';
                }
                if (perf.optimization_opportunities && perf.optimization_opportunities.length > 0) {
                    html += '<div class="analysis-item"><span class="analysis-label">Optimization Opportunities:</span><div style="margin-top: 5px;">';
                    perf.optimization_opportunities.forEach(o => html += `<div>→ ${o}</div>`);
                    html += '</div></div>';
                }
                html += '</div>';
            }
            
            // Recommendations
            const recs = analysis.recommendations || {};
            if (recs.immediate || recs.short_term || recs.long_term) {
                html += '<div class="analysis-section" style="border-left-color: #22c55e;">';
                html += '<h4>Recommendations</h4>';
                if (recs.immediate && recs.immediate.length > 0) {
                    html += '<div class="analysis-item"><span class="badge" style="background: #dc2626;">High Priority</span><div style="margin-top: 5px;">';
                    recs.immediate.forEach(r => html += `<div>• ${r}</div>`);
                    html += '</div></div>';
                }
                if (recs.short_term && recs.short_term.length > 0) {
                    html += '<div class="analysis-item"><span class="badge" style="background: #d97706;">Short Term</span><div style="margin-top: 5px;">';
                    recs.short_term.forEach(r => html += `<div>• ${r}</div>`);
                    html += '</div></div>';
                }
                if (recs.long_term && recs.long_term.length > 0) {
                    html += '<div class="analysis-item"><span class="badge" style="background: #0284c7;">Long Term</span><div style="margin-top: 5px;">';
                    recs.long_term.forEach(r => html += `<div>• ${r}</div>`);
                    html += '</div></div>';
                }
                html += '</div>';
            }
            
            // Notable Code
            const notable = analysis.notable_code || [];
            if (notable.length > 0) {
                html += '<div class="analysis-section">';
                html += '<h4>Notable Code</h4>';
                notable.forEach(n => {
                    html += '<div class="analysis-item">';
                    html += `<strong>${n.description}</strong>`;
                    if (n.file) html += ` <span class="text-muted">(${n.file})</span>`;
                    if (n.why_notable) html += `<div style="margin-top: 5px; font-size: 0.9em;">${n.why_notable}</div>`;
                    html += '</div>';
                });
                html += '</div>';
            }
            
            // Raw analysis fallback
            if (analysis.raw_analysis && !analysis.overall_assessment?.quality_score) {
                html += '<div class="analysis-section">';
                html += '<h4>Analysis Output</h4>';
                html += `<pre style="white-space: pre-wrap; font-size: 0.9em;">${analysis.raw_analysis}</pre>`;
                html += '</div>';
            }
            
            return html;
        }

        async function addThumbnail() {
            if (!selectedProjectId) {
                showMessage('Please select a project', 'error');
                return;
            }
            const fileInput = document.getElementById('thumbnailFile');
            const resultDiv = document.getElementById('thumbnailResult');
            if (!fileInput?.files[0]) {
                showMessage('Please select an image file', 'error');
                return;
            }
            const file = fileInput.files[0];
            if (!file.type || !file.type.startsWith('image/')) {
                showMessage('Thumbnail must be an image file', 'error');
                return;
            }
            const formData = new FormData();
            formData.append('file', file);
            resultDiv.innerHTML = 'Uploading thumbnail...';
            try {
                const data = await apiRequest(`/api/projects/${selectedProjectId}/thumbnail?user_name=${currentUser.user_name}`, {
                    method: 'POST',
                    body: formData
                });
                if (response.ok && data.success) {
                    resultDiv.innerHTML = 'Thumbnail uploaded successfully';
                    showMessage('Thumbnail uploaded', 'success');
                    await loadProjects();
                    refreshProjectListsWithThumbnails();
                } else {
                    resultDiv.innerHTML = data.detail || data.message || 'Thumbnail upload failed';
                    showMessage('Thumbnail upload failed', 'error');

                resultDiv.innerHTML = `Error: ${e.message}`;
                showMessage('Thumbnail upload failed', 'error');
            }

        async function mergeZipToProject() {
            if (!selectedProjectId) {
                showMessage('Please select a project to merge into', 'error');
                return;
            }
            const fileInput = document.getElementById('mergeZipFile');
            const resultDiv = document.getElementById('mergeResult');
            if (!fileInput?.files[0]) {
                showMessage('Please select a ZIP file to merge', 'error');
                return;
            }
            const file = fileInput.files[0];
            if (!file.name.endsWith('.zip')) {
                showMessage('Only ZIP files can be merged', 'error');
                return;
            }
            const formData = new FormData();
            formData.append('file', file);
            resultDiv.innerHTML = '<div style="text-align: center; padding: 20px;"><div class="spinner"></div><p style="margin-top: 10px;">Merging files into project...</p></div>';
            try {
                const data = await apiRequest(`/api/projects/${selectedProjectId}/merge?user_name=${currentUser.user_name}`, {
                    method: 'POST',
                    body: formData
                });
                if (response.ok && data.success) {
                    const mergeData = data.data || {};
                    let resultHtml = `<div class="analysis-section">
                        <h4>Merge Successful!</h4>
                        <div class="analysis-item">
                            <span class="analysis-label">New files added:</span>
                            <span class="analysis-value badge badge-success">${mergeData.new_files_count || 0}</span>
                        </div>
                        <div class="analysis-item">
                            <span class="analysis-label">Duplicates skipped:</span>
                            <span class="analysis-value badge badge-info">${mergeData.skipped_duplicates || 0}</span>
                        </div>`;
                    
                    if (mergeData.new_files && mergeData.new_files.length > 0) {
                        resultHtml += `<div style="margin-top: 10px;"><strong>New files:</strong><ul class="analysis-list">`;
                        mergeData.new_files.slice(0, 10).forEach(f => {
                            resultHtml += `<li>${f.file_path} <span class="text-muted">(${f.file_size} bytes)</span></li>`;
                        });
                        if (mergeData.new_files.length > 10) {
                            resultHtml += `<li class="text-muted">... and ${mergeData.new_files.length - 10} more files</li>`;
                        }
                        resultHtml += `</ul></div>`;
                    }
                    
                    resultHtml += `</div>`;
                    resultDiv.innerHTML = resultHtml;
                    showMessage(`Merged ${mergeData.new_files_count || 0} new files`, 'success');
                    await loadProjects();
                } else {
                    resultDiv.innerHTML = `<div class="message error">${data.detail || data.message || 'Merge failed'}</div>`;
                    showMessage('Merge failed', 'error');
                }
            } catch (e) {
                resultDiv.innerHTML = `<div class="message error">Error: ${e.message}</div>`;
                showMessage('Merge failed', 'error');
            }
        }

        // Theme Toggle
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeUI(newTheme);
        }

        function updateThemeUI(theme) {
            const themeIcon = document.getElementById('themeIcon');
            const themeLabel = document.getElementById('themeLabel');
            
            if (theme === 'dark') {
                // Show sun icon for switching to light
                themeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />';
                themeLabel.textContent = 'Light';
            } else {
                // Show moon icon for switching to dark
                themeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />';
                themeLabel.textContent = 'Dark';
            }
        }

        // Initialize theme on page load
        (function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeUI(savedTheme);
        })();
    </script>
