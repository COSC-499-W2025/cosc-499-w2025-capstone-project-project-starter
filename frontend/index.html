<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artifact - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle" aria-label="Toggle theme">
                <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                </svg>
            </button>
            <div class="logo">
                <h1>Artifact</h1>
                <p>Digital Work Portfolio Manager</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="login-form">
                <div id="messageBox" class="message"></div>
                
                <div class="form-group">
                    <label for="username">Username</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        placeholder="Enter your username"
                        autocomplete="username"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Enter your password"
                            autocomplete="current-password"
                            required
                        >
                        <button type="button" class="password-toggle" id="togglePassword" aria-label="Toggle password visibility">
                            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    Sign In
                </button>

                <div class="footer-links">
                    <p>Don't have an account? <a href="#" id="registerLink">Create one</a></p>
                </div>
            </form>

            <!-- Registration Form -->
            <form id="registerForm" class="register-form">
                <div id="registerMessageBox" class="message"></div>
                
                <div class="form-group">
                    <label for="regUsername">Username</label>
                    <input 
                        type="text" 
                        id="regUsername" 
                        name="username" 
                        placeholder="Choose a username"
                        autocomplete="username"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <div class="input-wrapper">
                        <input 
                            type="password" 
                            id="regPassword" 
                            name="password" 
                            placeholder="Create a password"
                            autocomplete="new-password"
                            required
                        >
                        <button type="button" class="password-toggle" id="toggleRegPassword" aria-label="Toggle password visibility">
                            <svg id="regEyeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                    <p class="password-requirements">Password must be at least 6 characters</p>
                </div>

                <div class="form-group">
                    <label for="regConfirmPassword">Confirm Password</label>
                    <div class="input-wrapper">
                        <input 
                            type="password" 
                            id="regConfirmPassword" 
                            name="confirmPassword" 
                            placeholder="Confirm your password"
                            autocomplete="new-password"
                            required
                        >
                    </div>
                </div>

                <button type="submit" class="btn-login" id="registerBtn">
                    Create Account
                </button>

                <button type="button" class="btn-secondary" id="backToLoginBtn">
                    Back to Sign In
                </button>
            </form>

            <!-- Welcome View (shown after successful login) -->
            <div id="welcomeView" class="welcome-view">
                <div class="welcome-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
                <h2>Welcome back!</h2>
                <p id="welcomeMessage">You are now logged in.</p>
                
                <div class="user-info" id="userInfoDisplay">
                    <div class="user-info-row">
                        <span class="user-info-label">Username</span>
                        <span class="user-info-value" id="displayUsername">-</span>
                    </div>
                    <div class="user-info-row">
                        <span class="user-info-label">User ID</span>
                        <span class="user-info-value" id="displayUserId">-</span>
                    </div>
                    <div class="user-info-row">
                        <span class="user-info-label">Last Login</span>
                        <span class="user-info-value" id="displayLastLogin">-</span>
                    </div>
                </div>

                <button type="button" class="btn-logout" id="logoutBtn">
                    Sign Out
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = window.location.origin;
        
        // DOM Elements - Login
        const loginForm = document.getElementById('loginForm');
        const welcomeView = document.getElementById('welcomeView');
        const messageBox = document.getElementById('messageBox');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const togglePassword = document.getElementById('togglePassword');
        const eyeIcon = document.getElementById('eyeIcon');
        const registerLink = document.getElementById('registerLink');

        // DOM Elements - Registration
        const registerForm = document.getElementById('registerForm');
        const registerMessageBox = document.getElementById('registerMessageBox');
        const registerBtn = document.getElementById('registerBtn');
        const backToLoginBtn = document.getElementById('backToLoginBtn');
        const regUsernameInput = document.getElementById('regUsername');
        const regPasswordInput = document.getElementById('regPassword');
        const regConfirmPasswordInput = document.getElementById('regConfirmPassword');
        const toggleRegPassword = document.getElementById('toggleRegPassword');
        const regEyeIcon = document.getElementById('regEyeIcon');

        // Check if user is already logged in on page load
        document.addEventListener('DOMContentLoaded', () => {
            const storedUser = localStorage.getItem('user');
            if (storedUser) {
                try {
                    const user = JSON.parse(storedUser);
                    showWelcomeView(user);
                } catch (e) {
                    localStorage.removeItem('user');
                }
            }
        });

        // Password visibility toggle
        togglePassword.addEventListener('click', () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            
            // Update icon
            if (type === 'text') {
                eyeIcon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                `;
            } else {
                eyeIcon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                `;
            }
        });

        // Show message helper
        function showMessage(message, type) {
            messageBox.textContent = message;
            messageBox.className = `message ${type}`;
        }

        // Clear message
        function clearMessage() {
            messageBox.className = 'message';
            messageBox.textContent = '';
        }

        // Format date for display
        function formatDate(dateString) {
            if (!dateString) return 'Never';
            const date = new Date(dateString);
            return date.toLocaleString();
        }

        // Show welcome view after successful login
        function showWelcomeView(user) {
            loginForm.classList.add('hidden');
            welcomeView.classList.add('active');
            
            document.getElementById('displayUsername').textContent = user.user_name;
            document.getElementById('displayUserId').textContent = user.user_id;
            document.getElementById('displayLastLogin').textContent = formatDate(user.last_login_time);
            document.getElementById('welcomeMessage').textContent = `Welcome, ${user.user_name}!`;
        }

        // Show login form
        function showLoginForm() {
            welcomeView.classList.remove('active');
            registerForm.classList.remove('active');
            loginForm.classList.remove('hidden');
            clearMessage();
            clearRegisterMessage();
            usernameInput.value = '';
            passwordInput.value = '';
        }

        // Login form submission
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            // Client-side validation
            if (!username) {
                showMessage('Please enter your username', 'error');
                usernameInput.focus();
                return;
            }

            if (!password) {
                showMessage('Please enter your password', 'error');
                passwordInput.focus();
                return;
            }

            // Show loading state
            loginBtn.classList.add('loading');
            loginBtn.disabled = true;
            clearMessage();

            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password }),
                });

                const data = await response.json();

                if (data.success && data.user) {
                    // Store user info in localStorage
                    localStorage.setItem('user', JSON.stringify(data.user));
                    // Redirect to dashboard
                    window.location.href = 'dashboard.html';
                } else {
                    showMessage(data.message || 'Login failed. Please try again.', 'error');
                }
            } catch (error) {
                console.error('Login error:', error);
                showMessage('Unable to connect to the server. Please check if the API is running.', 'error');
            } finally {
                loginBtn.classList.remove('loading');
                loginBtn.disabled = false;
            }
        });

        // Logout button
        logoutBtn.addEventListener('click', async () => {
            const storedUser = localStorage.getItem('user');
            if (!storedUser) {
                showLoginForm();
                return;
            }

            try {
                const user = JSON.parse(storedUser);
                
                const response = await fetch(`${API_BASE_URL}/api/auth/logout`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username: user.user_name }),
                });

                const data = await response.json();
                
                // Clear localStorage regardless of server response
                localStorage.removeItem('user');
                showLoginForm();
                
                if (data.success) {
                    showMessage('You have been logged out successfully.', 'success');
                }
            } catch (error) {
                console.error('Logout error:', error);
                // Still clear local storage and show login form
                localStorage.removeItem('user');
                showLoginForm();
            }
        });

        // Show registration form
        registerLink.addEventListener('click', (e) => {
            e.preventDefault();
            showRegisterForm();
        });

        // Back to login button
        backToLoginBtn.addEventListener('click', () => {
            showLoginForm();
        });

        // Password visibility toggle for registration
        toggleRegPassword.addEventListener('click', () => {
            const type = regPasswordInput.type === 'password' ? 'text' : 'password';
            regPasswordInput.type = type;
            
            // Update icon
            if (type === 'text') {
                regEyeIcon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                `;
            } else {
                regEyeIcon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                `;
            }
        });

        // Show register message helper
        function showRegisterMessage(message, type) {
            registerMessageBox.textContent = message;
            registerMessageBox.className = `message ${type}`;
        }

        // Clear register message
        function clearRegisterMessage() {
            registerMessageBox.className = 'message';
            registerMessageBox.textContent = '';
        }

        // Show registration form
        function showRegisterForm() {
            loginForm.classList.add('hidden');
            welcomeView.classList.remove('active');
            registerForm.classList.add('active');
            clearMessage();
            clearRegisterMessage();
            regUsernameInput.value = '';
            regPasswordInput.value = '';
            regConfirmPasswordInput.value = '';
            regUsernameInput.focus();
        }

        // Registration form submission
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = regUsernameInput.value.trim();
            const password = regPasswordInput.value;
            const confirmPassword = regConfirmPasswordInput.value;

            // Client-side validation
            if (!username) {
                showRegisterMessage('Please enter a username', 'error');
                regUsernameInput.focus();
                return;
            }

            if (!password) {
                showRegisterMessage('Please enter a password', 'error');
                regPasswordInput.focus();
                return;
            }

            if (password.length < 6) {
                showRegisterMessage('Password must be at least 6 characters long', 'error');
                regPasswordInput.focus();
                return;
            }

            if (password !== confirmPassword) {
                showRegisterMessage('Passwords do not match', 'error');
                regConfirmPasswordInput.focus();
                return;
            }

            // Show loading state
            registerBtn.classList.add('loading');
            registerBtn.disabled = true;
            clearRegisterMessage();

            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password }),
                });

                const data = await response.json();

                if (data.success) {
                    // Show success message and switch to login form
                    showLoginForm();
                    showMessage('Account created successfully! Please sign in.', 'success');
                    usernameInput.value = username;
                    usernameInput.focus();
                } else {
                    showRegisterMessage(data.message || 'Registration failed. Please try again.', 'error');
                }
            } catch (error) {
                console.error('Registration error:', error);
                showRegisterMessage('Unable to connect to the server. Please check if the API is running.', 'error');
            } finally {
                registerBtn.classList.remove('loading');
                registerBtn.disabled = false;
            }
        });

        // Theme Toggle
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        }

        function updateThemeIcon(theme) {
            const themeIcon = document.getElementById('themeIcon');
            
            if (theme === 'dark') {
                // Show sun icon for switching to light
                themeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />';
            } else {
                // Show moon icon for switching to dark
                themeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />';
            }
        }

        // Initialize theme on page load
        (function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);
        })();
    </script>
</body>
</html>
